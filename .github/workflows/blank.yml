name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-

      - name: Integrate KernelSU & SUSFS
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          
          # 1. Nettoyage et Clonage
          rm -rf drivers/kernelsu
          git clone https://github.com/tiann/KernelSU.git -b v0.9.5 drivers/kernelsu
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          
          # 2. Préparation des fichiers
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          cp drivers/kernelsu/kernel/ksu.h include/linux/kernelsu.h
          
          # 3. Création des fichiers Kconfig et Makefile
          cat <<-'EOF' > susfs_config.txt
          menu "KernelSU - SUSFS"
          config KSU_SUSFS
              bool "KernelSU addon - SUSFS"
              depends on KSU
              default y
          config KSU_SUSFS_SUS_PATH
              bool "Enable to hide suspicious path"
              depends on KSU_SUSFS
              default y
          config KSU_SUSFS_SUS_MOUNT
              bool "Enable to hide suspicious mounts"
              depends on KSU_SUSFS
              default y
          config KSU_SUSFS_SUS_KSTAT
              bool "Enable to spoof suspicious kstat"
              depends on KSU_SUSFS
              default y
          config KSU_SUSFS_SUS_MAPS
              bool "Enable to spoof suspicious maps"
              depends on KSU_SUSFS
              default y
          config KSU_SUSFS_TRY_UMOUNT
              bool "Enable to use ksu's try_umount"
              depends on KSU_SUSFS
              default y
          config KSU_SUSFS_SPOOF_UNAME
              bool "Enable to spoof uname"
              depends on KSU_SUSFS
              default y
          config KSU_SUSFS_ENABLE_LOG
              bool "Enable logging susfs log to kernel"
              depends on KSU_SUSFS
              default y
          endmenu
          EOF
          sed -i 's/^[ \t]*//' susfs_config.txt
          cat susfs_config.txt >> Kconfig
          
          cat <<-'EOF' > susfs_makefile.txt
          ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $?),0)
          ifdef KSU_SUSFS
          ccflags-y += -DKSU_SUSFS
          endif
          ifdef KSU_SUSFS_SUS_PATH
          ccflags-y += -DKSU_SUSFS_SUS_PATH
          endif
          ifdef KSU_SUSFS_SUS_MOUNT
          ccflags-y += -DKSU_SUSFS_SUS_MOUNT
          endif
          ifdef KSU_SUSFS_SUS_KSTAT
          ccflags-y += -DKSU_SUSFS_SUS_KSTAT
          endif
          ifdef KSU_SUSFS_SUS_MAPS
          ccflags-y += -DKSU_SUSFS_SUS_MAPS
          endif
          ifdef KSU_SUSFS_TRY_UMOUNT
          ccflags-y += -DKSU_SUSFS_TRY_UMOUNT
          endif
          ifdef KSU_SUSFS_SPOOF_UNAME
          ccflags-y += -DKSU_SUSFS_SPOOF_UNAME
          endif
          ifdef KSU_SUSFS_ENABLE_LOG
          ccflags-y += -DKSU_SUSFS_ENABLE_LOG
          endif
          endif
          EOF
          sed -i 's/^[ \t]*//' susfs_makefile.txt
          cat susfs_makefile.txt >> kernel/Makefile

