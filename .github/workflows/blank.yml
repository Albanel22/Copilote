name: Kernel CI — build & package
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-

      - name: Integrate KernelSU & SUSFS
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          # 1. KernelSU avec installation forcée des scripts init
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
          # 2. Injection propre dans le Kconfig (si pas déjà fait)
          if ! grep -q "drivers/kernelsu/Kconfig" init/Kconfig; then
            echo 'source "drivers/kernelsu/Kconfig"' >> init/Kconfig
          fi
          
          # 3. SUSFS
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          patch -p1 -f < susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true
          
      - name: Debug and Print Patch Failures
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "--- CONTENU DE fs/open.c.rej ---"
          [ -f fs/open.c.rej ] && cat fs/open.c.rej || echo "Fichier fs/open.c.rej introuvable"
          
          echo "--- CONTEXTE DE fs/open.c (Lignes 370-400) ---"
          sed -n '370,400p' fs/open.c
          
          echo "--- CONTENU DE fs/proc/task_mmu.c.rej ---"
          [ -f fs/proc/task_mmu.c.rej ] && cat fs/proc/task_mmu.c.rej || echo "Fichier fs/proc/task_mmu.c.rej introuvable"
          
          echo "--- CONTEXTE DE fs/proc/task_mmu.c (Lignes 10-50) ---"
          sed -n '10,50p' fs/proc/task_mmu.c

      
      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          ccache -C
          export ARCH=${{ env.ARCH }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Copie defconfig
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          
          # Injection MASSIVE des flags (on ne prend aucun risque)
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KRETPROBES=y"
            echo "CONFIG_KPROBES_ON_FTRACE=y"
          } >> arch/arm64/configs/${{ env.DEFCONFIG }}
          
          # Compilation
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 -j$(nproc) Image
      - name: Repack & Finalize
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack
          cp boot-stock.img repack/boot.img
          
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so repack/magiskboot
          chmod +x repack/magiskboot
          
          cd repack
          ./magiskboot unpack boot.img
          cp /home/runner/work/Copilote/Copilote/kernel_src/out/arch/arm64/boot/Image kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../final_boot.img
          cd ..
          
          mkdir -p final_output
          mv final_boot.img final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_final
          path: final_output/boot.img
