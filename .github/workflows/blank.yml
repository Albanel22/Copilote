name: Kernel CI — build & package (SUSFS ONLY)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260705/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang llvm lld device-tree-compiler zip unzip curl git python3

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-

      - name: 📂 Extraction et Intégration Pure de SUSFS
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -e

          # 1. 🧹 Nettoyage de toute trace résiduelle de KernelSU
          echo "🧹 Purge absolue des références à KernelSU..."
          sed -i '/[kK][eE][rR][nN][eE][lL][sS][uU]/d' Makefile || true
          rm -rf drivers/kernelsu || true
          sed -i '/[kK][eE][rR][nN][eE][lL][sS][uU]/d' drivers/Makefile || true
          sed -i '/[kK][eE][rR][nN][eE][lL][sS][uU]/d' drivers/Kconfig || true

          # 2. 📥 Récupération des fichiers SUSFS v4.19 via le miroir GitHub public
          echo "📥 Téléchargement direct des sources SUSFS..."
          mkdir -p include/linux
          
          curl -LSs "https://raw.githubusercontent.com/simonpunk/susfs4ksu/main/kernel_patches/fs/susfs.c" -o fs/susfs.c
          curl -LSs "https://raw.githubusercontent.com/simonpunk/susfs4ksu/main/kernel_patches/include/linux/susfs.h" -o include/linux/susfs.h

          # Vérification de sécurité pour s'assurer que le téléchargement a fonctionné
          if [ ! -s fs/susfs.c ] || [ ! -s include/linux/susfs.h ]; then
            echo "❌ Échec du téléchargement des fichiers SUSFS (Vérifie les URLs)"
            exit 1
          fi
          
          # Liaison de susfs.o au système de build de fs/
          if ! grep -q "susfs.o" fs/Makefile; then 
            echo 'obj-$(CONFIG_SUSFS) += susfs.o' >> fs/Makefile
          fi

          # Correction adaptative mmap_sem vers mmap_lock (Ton correctif stable du build 266)
          sed -i 's/mmap_sem/mmap_lock/g' fs/proc/base.c || true
          sed -i 's/mmap_sem/mmap_lock/g' fs/proc/task_mmu.c || true

          # Pré-injection de la configuration SUSFS directement dans ton defconfig Motorola
          TARGET_DEFCONFIG="arch/arm64/configs/vendor/lito-perf_defconfig"
          {
            echo "CONFIG_SUSFS=y"
            echo "CONFIG_SUSFS_SUS_PATH=y"
            echo "CONFIG_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_SUSFS_HIDE_KSU_DIR=y"
          } >> "$TARGET_DEFCONFIG"

          echo "✅ Phase d'ajustement SUSFS achevée."

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M ${{ env.CCACHE_SIZE }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KCFLAGS="-Wno-error"
          
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          
          # 1. Génération de la base .config
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          
          # Forçage strict des configurations requises pour faire vivre SUSFS
          {
            echo "CONFIG_SUSFS=y"
            echo "CONFIG_SUSFS_SUS_PATH=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_OVERLAY_FS_REDIRECT_DIR=y"
          } >> ${{ env.BUILD_DIR }}/.config
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          # 2. ⚡ CHIRURGIE NUCLÉAIRE SUSFS (SANS KERNELSU) ⚡
          echo "🚀 Injection des hooks SUSFS sur fs/open.c..."
          python3 -c '
          import os

          os.system("git checkout fs/open.c")

          with open("fs/open.c", "r") as f:
              orig_content = f.read()

          # Inclusion stricte de l’en-tête SUSFS sans aucun ksu.h
          headers = "#ifdef CONFIG_SUSFS\n#include <linux/susfs.h>\n#endif\n"
          new_content = headers + orig_content

          target_func = "long do_faccessat(int dfd, const char __user *filename, int mode)"
          idx = new_content.find(target_func)
          if idx != -1:
              brace_idx = new_content.find("{", idx)
              if brace_idx != -1:
                  vars_inj = "\n#ifdef CONFIG_SUSFS_SUS_PATH\n\tstruct filename *fname;\n\tint status;\n\tint error;\n#endif\n"
                  new_content = new_content[:brace_idx+1] + vars_inj + new_content[brace_idx+1:]
                  
                  idx_hook = new_content.find("if (mode & ~S_IRWXO)", brace_idx)
                  if idx_hook != -1:
                      hook_inj = "#ifdef CONFIG_SUSFS_SUS_PATH\n\tfname = getname_safe(filename);\n\tstatus = susfs_sus_path_by_filename(fname, &error, SYSCALL_FAMILY_ALL_ENOENT);\n\tputname_safe(fname);\n\tif (status) {\n\t\treturn error;\n\t}\n#endif\n\n\t"
                      new_content = new_content[:idx_hook] + hook_inj + new_content[idx_hook:]

          with open("fs/open.c", "w") as f:
              f.write(new_content)
          
          out_open_c = os.path.join("${{ env.BUILD_DIR }}", "fs/open.c")
          if os.path.exists(os.path.dirname(out_open_c)):
              os.makedirs(os.path.dirname(out_open_c), exist_ok=True)
              with open(out_open_c, "w") as f:
                  f.write(new_content)

          print("✅ Hooks SUSFS appliqués de manière isolée.")

          # Blindage de fs/proc/task_mmu.c (comme dans le build 266)
          def fix_task_mmu(filepath):
              if os.path.exists(filepath):
                  with open(filepath, "r") as f: content = f.read()
                  if "SUSFS_MAX_LEN_PATHNAME" not in content:
                      safety_headers = (
                          "#define CONFIG_SUSFS 1\n"
                          "#include <linux/susfs.h>\n"
                          "#ifndef SUSFS_MAX_LEN_PATHNAME\n"
                          "#define SUSFS_MAX_LEN_PATHNAME 512\n"
                          "#endif\n"
                      )
                      content = safety_headers + content
                      with open(filepath, "w") as f: f.write(content)
          fix_task_mmu("fs/proc/task_mmu.c")
          fix_task_mmu(os.path.join("${{ env.BUILD_DIR }}", "fs/proc/task_mmu.c"))
          '

          # Hacks de contournement matériels stables (Signatures & Tactile)
          sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          printf "\n/* --- Début Patch Tactile --- */\n#include <linux/notifier.h>\n#include <linux/module.h>\nstatic BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);\nint panel_register_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_register_notifier);\nint panel_unregister_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_unregister_notifier);\nvoid touch_set_state(int state) { return; }\nEXPORT_SYMBOL(touch_set_state);\n/* --- Fin Patch Tactile --- */\n" >> techpack/display/msm/msm_drv.c
          
          # 3. Lancement de la compilation
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 KCFLAGS="$KCFLAGS" -j$(nproc) Image

      - name: Repack & Finalize
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack
          cp boot-stock.img repack/boot.img
          
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so repack/magiskboot
          chmod +x repack/magiskboot
          rm -rf Magisk-v27.0.apk lib/
          
          cd repack
          ./magiskboot unpack boot.img
          cp ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../final_boot.img
          
          cd ..
          mkdir -p final_output
          mv final_boot.img final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_final
          path: final_output/boot.img
