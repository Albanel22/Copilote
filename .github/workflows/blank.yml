name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-

      - name: Injecter KernelSU & SUSFS manuellement
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          # 1. KernelSU officiel (setup.sh est fiable, on le garde)
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5

          # 2. Copie des fichiers SUSFS nécessaires
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/

          # 3. Injection des hooks SUSFS (remplace les patches qui échouent)
          
          # Hook dans fs/open.c
          sed -i '/if (error) return error;/a \
          #ifdef CONFIG_KSU_SUSFS_SUS_PATH\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif' fs/open.c

          # Hook dans fs/namespace.c (Injection de path_umount)
          echo -e '\nint path_umount(struct path *path, int flags) {\n\tstruct mount *mnt = real_mount(path->mnt);\n\tint ret;\n\tif (flags & ~(MNT_FORCE | MNT_DETACH | MNT_EXPIRE | UMOUNT_NOFOLLOW)) return -EINVAL;\n\tif (!may_mount()) return -EPERM;\n\tif (path->dentry != path->mnt->mnt_root) return -EINVAL;\n\tif (!check_mnt(mnt)) return -EINVAL;\n\tif (mnt->mnt.mnt_flags & MNT_LOCKED) return -EINVAL;\n\tif (flags & MNT_FORCE && !capable(CAP_SYS_ADMIN)) return -EPERM;\n\tret = do_umount(mnt, flags);\n\tdput(path->dentry);\n\tmntput_no_expire(mnt);\n\treturn ret;\n}' >> fs/namespace.c

          # Hooks dans drivers/kernelsu/core_hook.c
          sed -i '/#include "kernel_compat.h"/a #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' drivers/kernelsu/core_hook.c
          sed -i '/try_umount("\/system"/i #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT\n\tsusfs_try_umount(new_uid.val);\n#endif' drivers/kernelsu/core_hook.c

          # Hooks dans drivers/kernelsu/ksu.c
          sed -i '/#include "throne_tracker.h"/a #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' drivers/kernelsu/ksu.c
          sed -i '/ksu_core_init();/i #ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif' drivers/kernelsu/ksu.c

          # Hooks dans drivers/kernelsu/selinux/rules.c
          sed -i '/ksu_allow(db, "system_server", KERNEL_SU_DOMAIN, "process", "sigkill");/a \
          #ifdef CONFIG_KSU_SUSFS\n\tksu_allow(db, "zygote", "labeledfs", "filesystem", "unmount");\n#endif' drivers/kernelsu/selinux/rules.c
          
      - name: Multi-stage Kernel Compilation
        run: |
          set -uo pipefail
          ccache -C
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KCFLAGS="-Wno-error"
          
          echo "📂 Préparation du defconfig..."
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          
          echo "🔧 Injection forcée des flags requis..."
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KRETPROBES=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_OVERLAY_FS_REDIRECT_DIR=y"
          } >> ${{ env.BUILD_DIR }}/.config
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          echo "🔓 Force-pass des signatures & Tactile..."
          sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          printf "\n/* --- Début Patch Tactile --- */\n#include <linux/notifier.h>\n#include <linux/module.h>\nstatic BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);\nint panel_register_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_register_notifier);\nint panel_unregister_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_unregister_notifier);\nvoid touch_set_state(int state) { return; }\nEXPORT_SYMBOL(touch_set_state);\n/* --- Fin Patch Tactile --- */\n" >> techpack/display/msm/msm_drv.c
          
          echo "🚀 Compilation finale..."
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 KCFLAGS="$KCFLAGS" -j$(nproc) Image

      - name: Repack & Finalize
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack
          cp boot-stock.img repack/boot.img
          
          # Téléchargement et préparation de magiskboot
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so repack/magiskboot
          chmod +x repack/magiskboot
          
          # Repackage
          cd repack
          ./magiskboot unpack boot.img
          # Utilisation des variables pour le chemin du kernel
          cp ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../final_boot.img
          cd ..
          mkdir -p final_output
          mv final_boot.img final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_final
          path: final_output/boot.img
