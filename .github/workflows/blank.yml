- name: 📂 Intégration Structurelle SusFS & ReSukiSU (Manual Hooks)
        run: |
          set -e
          
          cp kiev_perfect_defconfig ${{ env.KERNEL_PATH }}/arch/arm64/configs/vendor/${{ env.DEFCONFIG }}

          cd ${{ env.KERNEL_PATH }}

          echo "🧼 Nettoyage des dossiers temporaires ou obsolètes..."
          rm -rf drivers/kernelsu kernelSU || true

          echo "📥 Téléchargement de ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          cd drivers/kernelsu && rm -rf .git && cd ../..

          # --- Neutralisation et copie blindée des en-têtes SusFS ---
          rm -f KernelSU/kernel/tools/inline_hook_check.mk drivers/kernelsu/kernel/tools/inline_hook_check.mk || true
          mkdir -p KernelSU/kernel/tools drivers/kernelsu/kernel/tools
          touch KernelSU/kernel/tools/inline_hook_check.mk drivers/kernelsu/kernel/tools/inline_hook_check.mk || true

          # Copie globale pour le noyau
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/

          # Copie ciblée et structurelle pour ReSukiSU dans TOUS ses sous-dossiers potentiels d'includes
          mkdir -p drivers/kernelsu/include/linux
          mkdir -p drivers/kernelsu/kernel/include/linux
          cp -r susfs4ksu/kernel_patches/include/linux/* drivers/kernelsu/include/linux/
          cp -r susfs4ksu/kernel_patches/include/linux/* drivers/kernelsu/kernel/include/linux/
          # ---------------------------------------------------------
          
          if ! grep -q "kernelsu" drivers/Kconfig; then echo 'source "drivers/kernelsu/kernel/Kconfig"' >> drivers/Kconfig; fi
          if ! grep -q "kernelsu" drivers/Makefile; then echo "obj-y += kernelsu/kernel/" >> drivers/Makefile; fi

          echo "Création du miroir structurel attendu par le patch SusFS..."
          mkdir -p kernelSU
          
          if [ -f drivers/kernelsu/uapi/ksu.h ]; then
            cp drivers/kernelsu/uapi/ksu.h kernelSU/ksu.h
            echo "✅ Fichier uapi/ksu.h copié avec succès vers kernelSU/ksu.h"
          else
            KSU_H_PATH=$(find drivers/kernelsu -name "ksu.h" | head -n 1)
            if [ -n "$KSU_H_PATH" ]; then
              cp "$KSU_H_PATH" kernelSU/ksu.h
              echo "✅ Fichier ksu.h trouvé via find et copié depuis $KSU_H_PATH"
            else
              touch kernelSU/ksu.h
            fi
          fi
          
          {
            echo -e "\n/* --- Stubs de sécurité SusFS --- */"
            echo "#define ksu_handle_faccessat(...) do {} while(0)"
            echo "#define ksu_handle_stat(...) do {} while(0)"
            echo "#define ksu_handle_vfs_read(...) do {} while(0)"
            echo "#define ksu_handle_setattr(...) do {} while(0)"
            echo "#define ksu_handle_sys_read(...) do {} while(0)"
          } >> kernelSU/ksu.h

          echo "📥 Application des Manual Hooks officiels pour Kernel 4.19 (ResukiSu)..."
          cat << 'EOF' > manual_hooks.patch
          From f74cc327cd2da3cf51d6a23eadc330e3f1fe38af Mon Sep 17 00:00:00 2001
          From: fc5b87cf <90097027+rsuntk@users.noreply.github.com>
          Date: Mon, 24 Nov 2025 13:04:18 +0000
          Subject: [PATCH] RKSU: Add manual hook support

          ---
          drivers/input/input.c |  8 ++++++++
          fs/exec.c             | 13 +++++++++++++
          fs/open.c             |  7 +++++++
          fs/read_write.c       |  9 +++++++++
          fs/stat.c             |  7 +++++++
          kernel/reboot.c       |  7 +++++++
          6 files changed, 51 insertions(+)

          diff --git a/drivers/input/input.c b/drivers/input/input.c
          index 45fdb9bdf08d..db5db9a858d5 100644
          --- a/drivers/input/input.c
          +++ b/drivers/input/input.c
          @@ -375,11 +375,19 @@ static int input_get_disposition(struct input_dev *dev,
          	return disposition;
          }
          
          #ifdef CONFIG_KSU
          extern bool ksu_input_hook __read_mostly;
          extern int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);
          #endif
          static void input_handle_event(struct input_dev *dev,
          					 unsigned int type, unsigned int code, int value)
          {
          	int disposition = input_get_disposition(dev, type, code, &value);
          
          #ifdef CONFIG_KSU
          	if (unlikely(ksu_input_hook))
          		ksu_handle_input_handle_event(&type, &code, &value);
          #endif
          	if (disposition != INPUT_IGNORE_EVENT && type != EV_SYN)
          		add_input_randomness(type, code, value);
          
          diff --git a/fs/exec.c b/fs/exec.c
          index d50d65857823..1199c1216a49 100644
          --- a/fs/exec.c
          +++ b/fs/exec.c
          @@ -1904,11 +1904,24 @@ static int __do_execve_file(int fd, struct filename *filename,
          	return retval;
          }
          
          #ifdef CONFIG_KSU
          extern bool ksu_execveat_hook __read_mostly;
          extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv,
          			void *envp, int *flags);
          extern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr,
          				 void *argv, void *envp, int *flags);
          #endif
          static int do_execveat_common(int fd, struct filename *filename,
          			      struct user_arg_ptr argv,
          			      struct user_arg_ptr envp,
          			      int flags)
          {
          #ifdef CONFIG_KSU
          	if (unlikely(ksu_execveat_hook))
          		ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);
          	else
          		ksu_handle_execveat_sucompat(&fd, &filename, &argv, &envp, &flags);
          #endif
          	return __do_execve_file(fd, filename, argv, envp, flags, NULL);
          }
          
          diff --git a/fs/open.c b/fs/open.c
          index 5c0043d4b807..98d50c79c414 100644
          --- a/fs/open.c
          +++ b/fs/open.c
          @@ -345,6 +345,10 @@ SYSCALL_DEFINE4(fallocate, int, fd, int, mode, loff_t, offset, loff_t, len)
           * We do this by temporarily clearing all FS-related capabilities and
           * switching the fsuid/fsgid around to the real ones.
           */
          #ifdef CONFIG_KSU
          extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode,
          			 int *flags);
          #endif
          long do_faccessat(int dfd, const char __user *filename, int mode)
          {
          	const struct cred *old_cred;
          @@ -354,6 +358,9 @@ long do_faccessat(int dfd, const char __user *filename, int mode)
          	int res;
          	unsigned int lookup_flags = LOOKUP_FOLLOW;
          
          #ifdef CONFIG_KSU
          	ksu_handle_faccessat(&dfd, &filename, &mode, NULL);
          #endif
          	if (mode & ~S_IRWXO)	/* where's F_OK, X_OK, W_OK, R_OK? */
          		return -EINVAL;
          
          diff --git a/fs/read_write.c b/fs/read_write.c
          index 93d06b4c5f78..40b1bb3f33e0 100644
          --- a/fs/read_write.c
          +++ b/fs/read_write.c
          @@ -443,10 +443,19 @@ ssize_t kernel_read(struct file *file, void *buf, size_t count, loff_t *pos)
          }
          EXPORT_SYMBOL_NS(kernel_read, ANDROID_GKI_VFS_EXPORT_ONLY);
          
          #ifdef CONFIG_KSU
          extern bool ksu_vfs_read_hook __read_mostly;
          extern int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr,
          			size_t *count_ptr, loff_t **pos);
          #endif
          ssize_t vfs_read(struct file *file, char __user *buf, size_t count, loff_t *pos)
          {
          	ssize_t ret;
          
          #ifdef CONFIG_KSU 
          	if (unlikely(ksu_vfs_read_hook))
          		ksu_handle_vfs_read(&file, &buf, &count, &pos);
          #endif
          	if (!(file->f_mode & FMODE_READ))
          		return -EBADF;
          	if (!(file->f_mode & FMODE_CAN_READ))
          diff --git a/fs/stat.c b/fs/stat.c
          index 298eb77668a7..bf6a3f937948 100644
          --- a/fs/stat.c
          +++ b/fs/stat.c
          @@ -165,6 +165,9 @@ EXPORT_SYMBOL(vfs_statx_fd);
           *
           * 0 will be returned on success, and a -ve error code if unsuccessful.
           */
          #ifdef CONFIG_KSU
          extern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);
          #endif
          int vfs_statx(int dfd, const char __user *filename, int flags,
          	      struct kstat *stat, u32 request_mask)
          {
          	int error = -EINVAL;
          	unsigned int lookup_flags = LOOKUP_FOLLOW | LOOKUP_AUTOMOUNT;
          
          #ifdef CONFIG_KSU
          	ksu_handle_stat(&dfd, &filename, &flags);
          #endif
          
          	if ((flags & ~(AT_SYMLINK_NOFOLLOW | AT_NO_AUTOMOUNT |
          		       AT_EMPTY_PATH | KSTAT_QUERY_FLAGS)) != 0)
          		return -EINVAL;
          
          diff --git a/kernel/reboot.c b/kernel/reboot.c
          index 790c2f514a55..bcedeac75d3a 100644
          --- a/kernel/reboot.c
          +++ b/kernel/reboot.c
          @@ -310,6 +310,9 @@ DEFINE_MUTEX(system_transition_mutex);
           *
           * reboot doesn't sync: do that yourself before calling this.
           */
          #ifdef CONFIG_KSU
          extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);
          #endif
          SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,
          		void __user *, arg)
          {
          	int ret = 0;
          	char buffer[256];
          
          #ifdef CONFIG_KSU 
          	ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);
          #endif
          
          	/* We only trust the superuser with rebooting the system. */
          	if (!ns_capable(pid_ns->user_ns, CAP_SYS_BOOT))
          		return -EPERM;
          EOF

          patch -p1 < manual_hooks.patch || echo "⚠️ Patch manual hooks appliqué avec des décalages"
          rm -f manual_hooks.patch

          echo "📥 Téléchargement et application de SusFS..."
          git clone https://gitlab.com/simonpunk/susfs4ksu.git --depth=1 susfs4ksu
          PATCH_FILE=$(find susfs4ksu/kernel_patches/ -name "*4.19*.patch" | head -n 1)
          
          patch -p1 < "$PATCH_FILE" || echo "⚠️ Patch SusFS appliqué avec décalages"

          echo "📦 Copie et adaptation des fichiers d'infrastructure SusFS..."
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          # Copie additionnelle pour que ReSukiSU trouve les en-têtes SusFS en interne
          mkdir -p drivers/kernelsu/include/linux
          cp -r susfs4ksu/kernel_patches/include/linux/* drivers/kernelsu/include/linux/

          if ! grep -q "susfs.o" fs/Makefile; then echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile; fi
          
          sed -i '/path_umount/ { s/.*/\t\/\/ path_umount neutralise\n\treturn;/ }' fs/susfs.c || true
          
          # Nettoyage chirurgical de la variable 'err' via Python (comme vu précédemment)
          python3 -c '
          path = "fs/susfs.c"
          with open(path, "r") as f:
              content = f.read()
          target_code = "if (err) {"
          replacement_code = "int err = 0;\n\tif (err) {"
          if target_code in content and "int err = 0;" not in content:
              content = content.replace(target_code, replacement_code, 1)
          else:
              content = content.replace("int susfs_try_umount(", "int susfs_try_umount(void) {\n    int err = 0;\n    ")
          with open(path, "w") as f:
              f.write(content)
          print("✅ Adaptation de fs/susfs.c terminée.")
          '

          rm -rf susfs4ksu


          echo "🛠️ Alignement des types de données SusFS (Kernel 4.19)..."
          sed -i '1i #include <linux/fs.h>\n#include <linux/types.h>\n#include <linux/sched.h>\n#include <linux/stat.h>' include/linux/susfs.h
          sed -i 's/vm_flags_t/unsigned long/g' include/linux/susfs.h fs/susfs.c || true
          
          if ! grep -q "SUSFS_MAX_LEN_PATHNAME" include/linux/susfs.h; then
            sed -i '/#define _LINUX_SUSFS_H/a #ifndef SUSFS_MAX_LEN_PATHNAME\n#define SUSFS_MAX_LEN_PATHNAME 512\n#endif' include/linux/susfs.h
          fi

          sed -i 's/mmap_sem/mmap_lock/g' fs/proc/base.c fs/proc/task_mmu.c || true
          if ! grep -q "linux/susfs.h" fs/proc/task_mmu.c; then
            sed -i '1i #include <linux/susfs.h>' fs/proc/task_mmu.c
          fi

          # ========================================================
          # 📂 APPLICATION DE VOS PATCHS LOCAUX INDIVIDUELS :
          # ========================================================
          echo "📂 Application de vos patchs locaux..."
          for patch in ../patches/*.patch; do
            if [ -f "$patch" ]; then
              echo "➡️ Application de : $(basename "$patch")"
              patch -p1 --forward < "$patch" || {
                echo "⚠️ Avertissement ou erreur mineure sur $patch (poursuite...)"
              }
            fi
          done
          echo "✅ Application des patchs terminée !"
          # ========================================================
