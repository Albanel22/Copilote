- name: Patch boot.img with KernelSU
        run: |
          set -euo pipefail
          
          # 1. Préparation
          mkdir -p patch_env && cp boot.img patch_env/boot.img
          cd patch_env
          
          # 2. Extraction fiable de magiskboot depuis l'APK
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          # 3. Extraction du boot.img
          ./magiskboot unpack boot.img
          
          # 4. Patch avec KernelSU
          # On utilise le script setup.sh qui patchera le binaire 'kernel' déjà présent dans l'unpack
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
          # 3. Extraction de l'image (pour obtenir les fichiers de config)
          ./magiskboot unpack boot.img 
          
          # 4. Patch KernelSU
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
          # 5. Repackage propre avec vérification de l'alignement
          # On utilise '--dtb' si présent pour conserver l'alignement spécifique Motorola
          if [ -f dtb ]; then
            ./magiskboot repack boot.img --dtb dtb
          else
            ./magiskboot repack boot.img
          fi
          
          # Vérification de sécurité du fichier généré
          mv new-boot.img ../patched-boot.img
