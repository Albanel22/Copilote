name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      kernel_repo_url:
        description: 'Optional: git URL of kernel source to clone'
        required: false
        default: 'https://github.com/LineageOS/android_kernel_motorola_sm8250'
      kernel_version:
        description: 'Kernel version (tag/branch/commit) to checkout (optional)'
        required: false
        default: ''
      kernel_path:
        description: 'Relative path to kernel root inside workspace if already present.'
        required: false
        default: 'kernel_src'
      arch:
        description: 'Target arch (arm64 or arm)'
        required: false
        default: 'arm64'
      defconfig:
        description: 'Kernel defconfig target'
        required: false
        default: 'vendor/lito-perf_defconfig'
      cross_toolchain_url:
        description: 'Optional URL to a cross toolchain archive (tar.xz).'
        required: false
        default: ''
      use_ccache:
        description: 'Use ccache (true/false)'
        required: false
        default: 'true'
      device:
        description: 'Device codename'
        required: false
        default: 'motorola_one_5g_ace'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: out
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set inputs
        id: vars
        run: |
          echo "KERNEL_REPO_URL=${{ github.event.inputs.kernel_repo_url }}" >> $GITHUB_OUTPUT
          echo "KERNEL_VERSION=${{ github.event.inputs.kernel_version }}" >> $GITHUB_OUTPUT
          echo "KERNEL_PATH_INPUT=${{ github.event.inputs.kernel_path }}" >> $GITHUB_OUTPUT
          echo "ARCH=${{ github.event.inputs.arch }}" >> $GITHUB_OUTPUT
          echo "DEFCONFIG=${{ github.event.inputs.defconfig }}" >> $GITHUB_OUTPUT
          echo "CROSS_TOOLCHAIN_URL=${{ github.event.inputs.cross_toolchain_url }}" >> $GITHUB_OUTPUT
          echo "USE_CCACHE=${{ github.event.inputs.use_ccache }}" >> $GITHUB_OUTPUT
          echo "DEVICE=${{ github.event.inputs.device }}" >> $GITHUB_OUTPUT

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc wget ccache git zip unzip pkg-config libelf-dev
          # Installation du compilateur croisé indispensable pour ARM64
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Clone kernel repo unless kernel_path in workspace already has Makefile
        id: clone_kernel
        run: |
          set -euo pipefail
          DEFAULT_CLONE_URL='https://github.com/LineageOS/android_kernel_motorola_sm8250'
          KERNEL_SRC="${GITHUB_WORKSPACE}/kernel_src"
          KP_INPUT="${{ steps.vars.outputs.KERNEL_PATH_INPUT }}"
          INPUT_URL="${{ steps.vars.outputs.KERNEL_REPO_URL }}"

          if [ -n "$KP_INPUT" ] && [ "$KP_INPUT" != "." ] && [ -f "${GITHUB_WORKSPACE}/$KP_INPUT/Makefile" ]; then
            echo "Makefile found at workspace path ${KP_INPUT} — skipping clone."
            echo "KERNEL_CLONED_PATH=${GITHUB_WORKSPACE}/$KP_INPUT" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -n "$INPUT_URL" ]; then
            CLONE_URL="$INPUT_URL"
          else
            CLONE_URL="$DEFAULT_CLONE_URL"
          fi

          echo "Cloning kernel repo: $CLONE_URL -> $KERNEL_SRC"
          rm -rf "$KERNEL_SRC"
          
          if [ -n "${{ secrets.KERNEL_TOKEN }}" ]; then
            KERNEL_TOKEN="${{ secrets.KERNEL_TOKEN }}"
            CLONE_URL="https://x-access-token:${KERNEL_TOKEN}@${CLONE_URL#https://}"
          fi
          
          git clone --depth=1 "$CLONE_URL" "$KERNEL_SRC"
          if [ -n "${{ steps.vars.outputs.KERNEL_VERSION }}" ]; then
            cd "$KERNEL_SRC"
            git fetch --depth=1 origin "${{ steps.vars.outputs.KERNEL_VERSION }}" || true
            git checkout "${{ steps.vars.outputs.KERNEL_VERSION }}" || true
          fi
          echo "KERNEL_CLONED_PATH=$KERNEL_SRC" >> $GITHUB_OUTPUT
        shell: bash

      - name: Determine kernel path
        id: detect
        run: |
          set -euo pipefail
          if [ -n "${{ steps.clone_kernel.outputs.KERNEL_CLONED_PATH }}" ]; then
            echo "KERNEL_PATH_FINAL=${{ steps.clone_kernel.outputs.KERNEL_CLONED_PATH }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          KP="${{ steps.vars.outputs.KERNEL_PATH_INPUT }}"
          if [ -z "$KP" ] || [ "$KP" = "." ]; then
            KP="${GITHUB_WORKSPACE}"
          else
            KP="${GITHUB_WORKSPACE}/$KP"
          fi
          echo "KERNEL_PATH_FINAL=$KP" >> $GITHUB_OUTPUT
        shell: bash

      - name: Export environment
        run: |
          echo "KERNEL_PATH=${{ steps.detect.outputs.KERNEL_PATH_FINAL }}" >> $GITHUB_ENV
          echo "ARCH=${{ steps.vars.outputs.ARCH }}" >> $GITHUB_ENV
          echo "DEFCONFIG=${{ steps.vars.outputs.DEFCONFIG }}" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "DEVICE=${{ steps.vars.outputs.DEVICE }}" >> $GITHUB_ENV
          echo "KERNEL_VERSION=${{ steps.vars.outputs.KERNEL_VERSION }}" >> $GITHUB_ENV

      - name: Configure kernel
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          # On force les variables en dur ici pour éviter tout oubli d'environnement
          TARGET_ARCH="${{ github.event.inputs.arch }}"
          TARGET_ARCH="${TARGET_ARCH:-arm64}"
          TARGET_DEFCONFIG="${{ github.event.inputs.defconfig }}"
          TARGET_DEFCONFIG="${TARGET_DEFCONFIG:-vendor/lito-perf_defconfig}"
          
          echo "Configuring kernel for ARCH=${TARGET_ARCH} with ${TARGET_DEFCONFIG}..."
          
          make O=$BUILD_DIR ARCH=${TARGET_ARCH} CROSS_COMPILE=aarch64-linux-gnu- ${TARGET_DEFCONFIG}
        shell: bash

      - name: Build kernel (Image, dtbs, modules)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          TARGET_ARCH="${{ github.event.inputs.arch }}"
          TARGET_ARCH="${TARGET_ARCH:-arm64}"
          
          echo "Starting build for ARCH=${TARGET_ARCH} with $JOBS jobs..."
          
          # Correction de la variable KCFLAGS (retrait du drapeau incomplet)
          export KCFLAGS="-Wno-error=format -Wno-error=unused-variable -Wno-error=format-security -Wno-error=incompatible-pointer-types"
          export HOSTCFLAGS="-Wno-error=format -Wno-error=unused-variable -Wno-error=format-security -Wno-error=incompatible-pointer-types"
          export CFLAGS_MODULE="-Wno-error=format -Wno-error=unused-variable"
          
          if [ "${TARGET_ARCH}" = "arm64" ]; then
            make -j$JOBS O=$BUILD_DIR ARCH=${TARGET_ARCH} CROSS_COMPILE=aarch64-linux-gnu- Image
            make -j$JOBS O=$BUILD_DIR ARCH=${TARGET_ARCH} CROSS_COMPILE=aarch64-linux-gnu- dtbs
          else
            make -j$JOBS O=$BUILD_DIR ARCH=${TARGET_ARCH} CROSS_COMPILE=aarch64-linux-gnu- zImage
            make -j$JOBS O=$BUILD_DIR ARCH=${TARGET_ARCH} CROSS_COMPILE=aarch64-linux-gnu- dtbs
          fi
          make -j$JOBS O=$BUILD_DIR ARCH=${TARGET_ARCH} CROSS_COMPILE=aarch64-linux-gnu- modules
        timeout-minutes: 120
        shell: bash




      - name: Install & package modules
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          mkdir -p tmp_modules
          make O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE modules_install INSTALL_MOD_PATH=$PWD/tmp_modules || true
          tar -C tmp_modules -czf modules.tar.gz .
        shell: bash

      - name: Built-in packaging (create flashable zip)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/artifacts"
          FLASH_DIR="${ARTIFACT_DIR}/flash"
          rm -rf "$FLASH_DIR" "$ARTIFACT_DIR"
          mkdir -p "$FLASH_DIR"
          KROOT="${{ env.KERNEL_PATH }}"
          
          if [ -f "$KROOT/$BUILD_DIR/arch/arm64/boot/Image" ]; then
            cp "$KROOT/$BUILD_DIR/arch/arm64/boot/Image" "$FLASH_DIR/kernel.img" || true
          elif [ -f "$KROOT/$BUILD_DIR/arch/arm/boot/zImage" ]; then
            cp "$KROOT/$BUILD_DIR/arch/arm/boot/zImage" "$FLASH_DIR/kernel.img" || true
          fi
          
          mkdir -p "$FLASH_DIR/dtbs"
          shopt -s nullglob
          for f in "$KROOT/$BUILD_DIR"/arch/*/boot/dts/**/*.dtb "$KROOT/$BUILD_DIR"/arch/*/boot/dts/*.dtb; do
            cp -v "$f" "$FLASH_DIR/dtbs/" || true
          done
          shopt -u nullglob
          
          if [ -f "$KROOT/$BUILD_DIR/arch/arm64/boot/dtbo.img" ]; then
            cp "$KROOT/$BUILD_DIR/arch/arm64/boot/dtbo.img" "$FLASH_DIR/dtbo.img" || true
          fi
          
          if [ -f "$KROOT/modules.tar.gz" ]; then
            cp "$KROOT/modules.tar.gz" "$FLASH_DIR/modules.tar.gz" || true
          fi
          
          ZIP="${ARTIFACT_DIR}/kernel-${{ env.DEVICE }}-latest.zip"
          pushd "$FLASH_DIR" >/dev/null
          zip -r -y "$ZIP" . || true
          popd >/dev/null
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts-${{ github.run_id }}
          path: |
            artifacts
            ${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/.config
