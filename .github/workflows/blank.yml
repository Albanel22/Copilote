name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img stock officiel depuis : ${{ env.BOOT_URL }}"
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort ou invalide pour le boot.img"; exit 1; }
        shell: bash

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Force Built-in Touchscreen Drivers & Bus (Option A)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "🛠️ Configuration agressive du matériel tactile Motorola..."
          TARGET_CONFIG="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          if [ ! -f "$TARGET_CONFIG" ]; then
            TARGET_CONFIG="arch/arm64/configs/${{ env.DEFCONFIG }}"
          fi
          
          echo "CONFIG_SPI=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SPI_MASTER=y" >> "$TARGET_CONFIG"
          echo "CONFIG_I2C=y" >> "$TARGET_CONFIG"
          echo "CONFIG_I2C_CHARDEV=y" >> "$TARGET_CONFIG"
          echo "CONFIG_INPUT_TOUCHSCREEN=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_NOVATEK_NVT_TS=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_GOODIX_BRL=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_FOCALTECH=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_SYNAPTICS_DSX=y" >> "$TARGET_CONFIG"
          echo "CONFIG_REGULATOR=y" >> "$TARGET_CONFIG"
          echo "CONFIG_REGULATOR_FIXED_VOLTAGE=y" >> "$TARGET_CONFIG"
          
          echo "✅ Bus matériels et pilotes tactiles injectés au cœur du noyau."

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache Size
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = ${{ env.CCACHE_SIZE }}" > ~/.cache/ccache/ccache.conf

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error"
          
          echo "🛠️ Étape 1 : Génération de la configuration..."
          if [ -f "arch/arm64/configs/vendor/${{ env.DEFCONFIG }}" ]; then
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/${{ env.DEFCONFIG }}
          else
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE ${{ env.DEFCONFIG }}
          fi
          
          echo "🚀 Étape 2 : Compilation ciblée de l'image de base (Image)..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" -j$(nproc) Image
          
          echo "🚀 Étape 3 : Compilation ciblée des modules restant..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" -j$(nproc) modules
          
          echo "🚀 Étape 4 : Compilation RESTRICTIVE ET FORCÉE du DTB/DTBO pour LITO (kiev)..."
          # Au lieu de 'make dtbs' général, on pointe directement vers les cibles Qualcomm de ton SoC
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE DTC_EXT=dtc KCFLAGS="$KCFLAGS" -j$(nproc) arch/arm64/boot/dts/vendor/qcom/lito.dtb || echo "⚠️ Échec lito.dtb standard, on tente la structure alternative"
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE DTC_EXT=dtc KCFLAGS="$KCFLAGS" -j$(nproc) dtbs-dtbo || echo "⚠️ Compilation secondaire des overlays terminée."

      - name: Install & package modules
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          MOD_PATH="${{ github.workspace }}/tmp_modules"
          mkdir -p "$MOD_PATH"
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- KBUILD_MODPOST_WARN=1 INSTALL_MOD_PATH="$MOD_PATH" modules_install || true
          
          cd "$MOD_PATH"
          if [ -d "lib" ]; then
            tar -czf ${{ github.workspace }}/modules.tar.gz .
          else
            echo "placeholder" > ${{ github.workspace }}/empty_module
            tar -czf ${{ github.workspace }}/modules.tar.gz ${{ github.workspace }}/empty_module
          fi
        shell: bash

      - name: Repack Boot Image with Magiskboot, Custom DTB & DTBO
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          ./magiskboot unpack boot.img
          
          ABS_IMAGE_ARM64="${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image"
          cp -v "$ABS_IMAGE_ARM64" kernel
          
          COMPILED_DTB=$(find ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/ -name "*lito*.dtb" -print -quit)
          if [ -f "$COMPILED_DTB" ]; then
            echo "🔄 Remplacement du DTB d'origine par notre lito.dtb tout neuf..."
            cp -v "$COMPILED_DTB" dtb
          else
            echo "⚠️ lito.dtb introuvable."
          fi
          
          COMPILED_DTBO=$(find ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/ -name "*.dtbo" -print -quit)
          if [ -f "$COMPILED_DTBO" ]; then
            echo "🔥 Remplacement du dtbo par notre version compilée..."
            if [ -f "recovery_dtbo" ]; then
              cp -v "$COMPILED_DTBO" recovery_dtbo
            elif [ -f "dtbo" ]; then
              cp -v "$COMPILED_DTBO" dtbo
            else
              cp -v "$COMPILED_DTBO" dtbo 2>/dev/null || true
            fi
          else
            echo "⚠️ Aucun fichier .dtbo compilé trouvé."
          fi
          
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img "${{ github.workspace }}/boot.img"
        shell: bash

      - name: Organize Final Output Artifacts
        run: |
          mkdir -p final_output/dtbs
          mv "${{ github.workspace }}/boot.img" final_output/boot.img
          
          if [ -f "${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image" ]; then
            cp "${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image" final_output/kernel.img
          fi
          
          if [ -f "${{ github.workspace }}/modules.tar.gz" ]; then
            mv "${{ github.workspace }}/modules.tar.gz" final_output/
          fi
          
          find ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/ -name "*.dtb" -exec cp {} final_output/dtbs/ \; 2>/dev/null || true
          find ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/ -name "*.dtbo" -exec cp {} final_output/dtbs/ \; 2>/dev/null || true
          
      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_one_5g_ace-latest
          path: final_output/
