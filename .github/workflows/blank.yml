name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img stock officiel..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort ou invalide pour le boot.img"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Clean Stock Kernel Test (No KSU)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "🧹 Mode diagnostic actif : Aucun patch appliqué."
          echo "📝 Configuration du defconfig d'origine..."
          TARGET_CONFIG="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          if [ ! -f "$TARGET_CONFIG" ]; then
            TARGET_CONFIG="arch/arm64/configs/${{ env.DEFCONFIG }}"
          fi
          echo "✅ Prêt pour un build 100% stock LineageOS."
          
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache Size
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = ${{ env.CCACHE_SIZE }}" > ~/.cache/ccache/ccache.conf

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error"
          
          echo "📥 Injection de la configuration d'origine..."
          cp ../kiev_perfect_defconfig arch/arm64/configs/vendor/kiev_perfect_defconfig
          
          echo "🛠️ Étape 1 : Génération de la configuration..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/kiev_perfect_defconfig

          echo "🔍 Recherche automatique et export global de panel_register_notifier..."
          # On cherche tous les fichiers .c qui contiennent la définition de la fonction et on exporte le symbole
          TARGET_FILES=$(grep -rl "int panel_register_notifier" . || true)
          if [ -n "$TARGET_FILES" ]; then
            for f in $TARGET_FILES; do
              echo "💉 Application du correctif d'exportation dans : $f"
              echo "" >> "$f"
              echo "EXPORT_SYMBOL(panel_register_notifier);" >> "$f"
              echo "EXPORT_SYMBOL(panel_unregister_notifier);" >> "$f"
            done
          else
            echo "⚠️ Définition stricte non trouvée, scan large..."
            TARGET_FILES_WIDE=$(grep -rl "panel_register_notifier" . | grep -E "\.c$" || true)
            for f in $TARGET_FILES_WIDE; do
              if ! grep -q "EXPORT_SYMBOL(panel_register_notifier)" "$f"; then
                echo "EXPORT_SYMBOL(panel_register_notifier);" >> "$f"
                echo "EXPORT_SYMBOL(panel_unregister_notifier);" >> "$f"
              fi
            done
          fi

          echo "🪓 Modification forcée des Makefiles tactiles 🪓"
          if [ -f "techpack/display/drivers/input/touchscreen/Makefile" ]; then
            sed -i 's/obj-\$(CONFIG_TOUCHSCREEN_FTS)/obj-y/g' techpack/display/drivers/input/touchscreen/Makefile
            sed -i 's/obj-\$(CONFIG_TOUCHSCREEN_MOTOROLA_MULTSENSE)/obj-y/g' techpack/display/drivers/input/touchscreen/Makefile
            echo "obj-y += fts/" >> techpack/display/drivers/input/touchscreen/Makefile
          fi

          echo "⚙️ Forçage des configs de secours..."
          {
            echo "CONFIG_DRM_PANEL_NOTIFIER=y"
            echo "CONFIG_INPUT_TOUCHSCREEN=y"
            echo "CONFIG_TOUCHSCREEN_MOTOROLA_MULTSENSE=y"
            echo "CONFIG_TOUCHSCREEN_FTS=y"
          } >> ${{ env.BUILD_DIR }}/.config

          echo "💉 Correctif de l'erreur strnstr..."
          sed -i 's/strnstr(dev_name(dev), "mdp")/strnstr(dev_name(dev), "mdp", strlen(dev_name(dev)))/g' drivers/gpu/drm/msm/msm_drv.c

          echo "🚀 Étape 2 : Compilation finale du noyau..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" -j$(nproc) Image
          
      - name: Repack Clean Boot Image
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          ./magiskboot unpack boot.img
          
          ABS_IMAGE_ARM64="${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image"
          cp -v "$ABS_IMAGE_ARM64" kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img "${{ github.workspace }}/boot.img"

      - name: Organize Final Output Artifacts
        run: |
          mkdir -p final_output
          mv "${{ github.workspace }}/boot.img" final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_one_5g_ace-latest
          path: final_output/
