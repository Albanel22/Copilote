name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        run: |
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          export ARCH=${{ env.ARCH }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          # Optimisation linker pour éviter les crashs OOM (Out of Memory)
          export LDFLAGS="--threads=1"
          
          # 1. Installation propre de KernelSU v0.9.5 (Built-in)
          rm -rf KernelSU
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
          # 2. Activation des dépendances obligatoires pour KernelSU (KPROBES)
          sed -i '/CONFIG_KSU/d; /CONFIG_KPROBES/d; /CONFIG_HAVE_KPROBES/d; /CONFIG_KPROBE_EVENTS/d' arch/arm64/configs/vendor/${{ env.DEFCONFIG }}
          echo -e "\nCONFIG_KSU=y\nCONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/vendor/${{ env.DEFCONFIG }}
          
          # 3. Préparation du noyau
          make O=../${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/${{ env.DEFCONFIG }}
          make O=../${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE olddefconfig
          
          # 4. Compilation avec limitations de threads pour stabilité RAM
          # AUCUNE modification réseau appliquée ici pour préserver 100% des fonctions
          echo "🚀 Compilation KernelSU (kiev) - Full Feature Support"
          make O=../${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE LDFLAGS="$LDFLAGS" -j2 Image.gz-dtb

      - name: Repack Boot Image with Magiskboot
        run: |
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          curl -fLo magiskboot https://github.com/topjohnwu/Magisk/releases/download/v27.0/magiskboot
          chmod +x magiskboot
          
          ./magiskboot unpack boot.img
          cp ../${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image.gz-dtb kernel
          ./magiskboot repack boot.img
          mv new-boot.img ../boot.img

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-kernelsu
          path: boot.img
