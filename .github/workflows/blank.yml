name: Kernel CI — build & package

on:
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260705/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang llvm lld device-tree-compiler zip unzip curl git python3

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img d'origine..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Motorola Kernel Source
        run: |
          echo "📥 Récupération des sources du noyau..."
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-

      - name: 📂 Intégration ReSukiSU via setup.sh
        run: |
          set -e
          
          # Copie de ton defconfig personnel dans les sources clonées
          cp kiev_perfect_defconfig ${{ env.KERNEL_PATH }}/arch/arm64/configs/vendor/${{ env.DEFCONFIG }}

          cd ${{ env.KERNEL_PATH }}

          echo "🧼 Nettoyage des dossiers temporaires ou obsolètes..."
          rm -rf drivers/kernelsu kernelSU susfs4ksu || true

          echo "📥 Exécution du script d'installation ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

          echo "🔨 Neutralisation radicale de TOUS les scripts de vérification des hooks..."
          find . -type f -name "*hook_check.mk" -exec sh -c 'echo "" > "$1"' _ {} \;

      - name: 💉 Injection directe des hooks manuels et symboles SELinux
        run: |
          cd ${{ env.KERNEL_PATH }}
          echo "⚙️ Injection manuelle des hooks dans les sources du noyau..."

          # 1. drivers/input/input.c
          sed -i '/void input_event/i \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          extern bool ksu_input_hook __read_mostly;\
          extern __attribute__((cold)) int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);\
          #endif\n' drivers/input/input.c

          sed -i '/void input_event(struct input_dev \*dev,/a \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          \    if (unlikely(ksu_input_hook))\
          \        ksu_handle_input_handle_event(&type, &code, &value);\
          #endif\n' drivers/input/input.c

          # 2. fs/exec.c
          sed -i '/int do_execve(/i \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          __attribute__((hot))\
          extern int ksu_handle_execve(struct filename **filename_ptr, const char __user *const __user **argv_ptr, const char __user *const __user **envp_ptr);\
          #endif\n' fs/exec.c

          sed -i '/int do_execve(/a \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          \    ksu_handle_execve(&filename, &__argv, &__envp);\
          #endif' fs/exec.c

          # 3. fs/open.c
          sed -i '/SYSCALL_DEFINE3(faccessat/i \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          __attribute__((hot))\
          extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\
          #endif\n' fs/open.c

          sed -i '/SYSCALL_DEFINE3(faccessat/a \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          \    ksu_handle_faccessat(&dfd, &filename, &mode, NULL);\
          #endif' fs/open.c

          # 4. fs/read_write.c
          sed -i '/SYSCALL_DEFINE3(read/i \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          extern bool ksu_init_rc_hook __read_mostly;\
          extern __attribute__((cold)) int ksu_handle_sys_read(unsigned int fd, char __user **buf_ptr, size_t *count_ptr);\
          #endif\n' fs/read_write.c

          sed -i '/SYSCALL_DEFINE3(read/a \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          \    if (unlikely(ksu_init_rc_hook))\
          \        ksu_handle_sys_read(fd, &buf, &count);\
          #endif' fs/read_write.c

          # 5. fs/stat.c
          sed -i '/SYSCALL_DEFINE4(newfstatat/i \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          __attribute__((hot))\
          extern int ksu_handle_stat(int *dfd, struct filename **filename_ptr, int *flags);\
          #endif\n' fs/stat.c

          sed -i '/SYSCALL_DEFINE4(newfstatat/a \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          \    struct filename *name = getname(filename);\
          \    ksu_handle_stat(&dfd, &name, &flag);\
          #endif' fs/stat.c

          # 6. kernel/reboot.c
          sed -i '/SYSCALL_DEFINE4(reboot/i \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\
          #endif\n' kernel/reboot.c

          sed -i '/SYSCALL_DEFINE4(reboot/a \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          \    ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\
          #endif' kernel/reboot.c

          # 7. kernel/sys.c
          sed -i '/long __sys_setresuid(/i \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          extern int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid);\
          #endif\n' kernel/sys.c

          sed -i '/long __sys_setresuid(/a \
          #ifdef CONFIG_KSU_MANUAL_HOOK\
          \    (void)ksu_handle_setresuid(ruid, euid, suid);\
          #endif' kernel/sys.c

          # 8. Exports SELinux symbols
          sed -i 's/static struct security_operations selinux_ops/struct security_operations selinux_ops/g' security/selinux/hooks.c
          sed -i 's/static DEFINE_MUTEX(sel_mutex);/DEFINE_MUTEX(sel_mutex);/g' security/selinux/selinuxfs.c
          sed -i 's/static const struct file_operations sel_handle_status_ops/const struct file_operations sel_handle_status_ops/g' security/selinux/selinuxfs.c
          sed -i 's/static ssize_t (\*write_op\[\])/ssize_t (\*write_op\[\])/g' security/selinux/selinuxfs.c
          sed -i 's/static DEFINE_RWLOCK(policy_rwlock);/DEFINE_RWLOCK(policy_rwlock);/g' security/selinux/ss/services.c
          sed -i 's/static struct page \*selinux_status_page;/struct page \*selinux_status_page;/g' security/selinux/ss/services.c
          sed -i 's/static DEFINE_MUTEX(selinux_status_lock);/DEFINE_MUTEX(selinux_status_lock);/g' security/selinux/ss/services.c

          echo "✅ Tous les hooks manuels et symboles SELinux ont été injectés avec succès !"
          
      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M ${{ env.CCACHE_SIZE }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KCFLAGS="-Wno-error"
          
          mkdir -p ${{ env.BUILD_DIR }}
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          
          # Forçage des drapeaux de configuration ReSukiSU (Manual Hook activé)
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KRETPROBES=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_OVERLAY_FS_REDIRECT_DIR=y"
          } >> ${{ env.BUILD_DIR }}/.config
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          # Fixs signatures modules & Dalle tactile Motorola
          sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          printf "\n/* --- Début Patch Tactile --- */\n#include <linux/notifier.h>\n#include <linux/module.h>\nstatic BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);\nint panel_register_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_register_notifier);\nint panel_unregister_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_unregister_notifier);\nvoid touch_set_state(int state) { return; }\nEXPORT_SYMBOL(touch_set_state);\n/* --- Fin Patch Tactile --- */\n" >> techpack/display/msm/msm_drv.c
          
          echo "🚀 Lancement de la compilation de l'Image..."
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 KCFLAGS="$KCFLAGS" KSUD_VERSION=35005 KSU_VERSION=35005 -j$(nproc) Image --output-sync=none

      - name: Repack & Finalize
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack
          cp boot-stock.img repack/boot.img
          
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so repack/magiskboot
          chmod +x repack/magiskboot
          rm -rf Magisk-v27.0.apk lib/
          
          cd repack
          ./magiskboot unpack boot.img
          cp ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../final_boot.img
          
          cd ..
          mkdir -p final_output
          mv final_boot.img final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_final
          path: final_output/boot.img
