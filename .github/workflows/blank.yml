name: Build Kernel (KernelSU-Next & SUSFS)

on:
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: kernel_src/out
  ARCH: arm64
  # Correction cruciale pour l'architecture SM8250 (Kona) au lieu de lito (SM7250)
  DEFCONFIG: kona-perf_defconfig

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev ccache bison flex libelf-dev clang lld llvm

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 ${{ env.KERNEL_PATH }}

      - name: Integrate KernelSU-Next & SUSFS Patches
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "📥 Téléchargement et configuration automatique de KernelSU-Next..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

          echo "📥 Clonage des patchs SUSFS..."
          cd ..
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 susfs_src
          cd ${{ env.KERNEL_PATH }}

          echo "🛠️ Copie des pilotes et en-têtes SUSFS..."
          SUSFS_PATCHES_DIR="../susfs_src/kernel_patches"
          
          cp -v "$SUSFS_PATCHES_DIR/include/linux/susfs.h" include/linux/
          cp -v "$SUSFS_PATCHES_DIR/fs/susfs.c" fs/
          
          echo "🛠️ Application du patch SUSFS principal..."
          patch -p1 < "$SUSFS_PATCHES_DIR/50_add_susfs_in_kernel-4.19.patch" || echo "⚠️ Patch noyau partiel"

          echo "🛠️ Application du patch SUSFS sur KernelSU-Next..."
          PATCH_KSU=$(find "$SUSFS_PATCHES_DIR/KernelSU" -name "*.patch" | head -n 1)
          if [ -f "$PATCH_KSU" ]; then
            cp -v "$PATCH_KSU" drivers/kernelsu/
            cd drivers/kernelsu
            patch -p1 < "$(basename "$PATCH_KSU")" || echo "⚠️ Patch KSU partiel"
            cd ../../
          fi

          echo "📝 Configuration du defconfig d'origine..."
          TARGET_CONFIG="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          if [ ! -f "$TARGET_CONFIG" ]; then
            TARGET_CONFIG="arch/arm64/configs/${{ env.DEFCONFIG }}"
          fi

          echo "CONFIG_TOUCHSCREEN_FOCALTECH_FTS=y" >> "$TARGET_CONFIG"
          echo "CONFIG_KPROBES=n" >> "$TARGET_CONFIG"
          echo "CONFIG_KSU_KPROBE_HOOKS=n" >> "$TARGET_CONFIG"
          echo "CONFIG_KSU=y" >> "$TARGET_CONFIG"
          echo "CONFIG_KSU_NEXT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_SUS_PATH=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_SUS_MOUNT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_OPEN_REDIRECT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_SUS_SU=y" >> "$TARGET_CONFIG"

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error"

          echo "🛠️ Étape 1 : Configuration..."
          if [ -f "arch/arm64/configs/vendor/${{ env.DEFCONFIG }}" ]; then
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/${{ env.DEFCONFIG }}
          else
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE ${{ env.DEFCONFIG }}
          fi

          echo "🛠️ Étape 1.5 : Injection .config..."
          FINAL_CONFIG="${{ env.BUILD_DIR }}/.config"
          
          sed -i 's/CONFIG_KPROBES=y/# CONFIG_KPROBES is not set/g' "$FINAL_CONFIG"
          echo "CONFIG_KPROBES=n" >> "$FINAL_CONFIG"
          echo "CONFIG_KSU_KPROBE_HOOKS=n" >> "$FINAL_CONFIG"
          echo "CONFIG_TOUCHSCREEN_FOCALTECH_FTS=y" >> "$FINAL_CONFIG"
          echo "CONFIG_KSU=y" >> "$FINAL_CONFIG"
          echo "CONFIG_KSU_NEXT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_SUS_PATH=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_SUS_MOUNT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_OPEN_REDIRECT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_SUS_SU=y" >> "$FINAL_CONFIG"

          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE olddefconfig

          echo "🚀 Étape 2 : Compilation..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" -j$(nproc) Image

      - name: Upload Kernel Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image-KernelSU-Next-SUSFS
          path: ${{ env.BUILD_DIR }}/arch/arm64/boot/Image
