name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version (tag/branch/commit) — ex: 3d1977c452283605fde69bbfc4e039b1a30916b7'
        required: false
        default: '3d1977c452283605fde69bbfc4e039b1a30916b7'
      kernel_path:
        description: 'Path in repo to kernel source (relative) — ex: kernel'
        required: false
        default: '.'
      kernel_repo_url:
        description: 'Optional: git URL of kernel source to clone (ex: https://github.com/LineageOS/android_kernel_motorola_sm8250)'
        required: false
        default: ''
      device:
        description: 'Device codename (informational)'
        required: false
        default: 'motorola_one_5g_ace'
      lineage:
        description: 'LineageOS target (informational)'
        required: false
        default: 'lineage-23.2'
      arch:
        description: 'Target arch (arm64 or arm)'
        required: false
        default: 'arm64'
      defconfig:
        description: 'Kernel defconfig name (ex: vendor/kona-perf_defconfig)'
        required: false
        default: 'vendor/kona-perf_defconfig'
      cross_toolchain_url:
        description: 'Direct archive URL of cross toolchain (optional). If empty, relies on system toolchain.'
        required: false
        default: ''
      use_ccache:
        description: 'Use ccache to speed repeated builds'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: out
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up variables
        id: vars
        run: |
          echo "KERNEL_VERSION=${{ github.event.inputs.kernel_version }}" >> $GITHUB_OUTPUT
          echo "KERNEL_PATH_INPUT=${{ github.event.inputs.kernel_path }}" >> $GITHUB_OUTPUT
          echo "KERNEL_REPO_URL=${{ github.event.inputs.kernel_repo_url }}" >> $GITHUB_OUTPUT
          echo "ARCH=${{ github.event.inputs.arch }}" >> $GITHUB_OUTPUT
          echo "DEFCONFIG=${{ github.event.inputs.defconfig }}" >> $GITHUB_OUTPUT
          echo "CROSS_TOOLCHAIN_URL=${{ github.event.inputs.cross_toolchain_url }}" >> $GITHUB_OUTPUT
          echo "USE_CCACHE=${{ github.event.inputs.use_ccache }}" >> $GITHUB_OUTPUT
          echo "DEVICE=${{ github.event.inputs.device }}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc wget ccache git

      - name: Optionally clone kernel repo (if kernel_repo_url provided)
        if: steps.vars.outputs.KERNEL_REPO_URL != ''
        run: |
          set -euo pipefail
          echo "Cloning kernel repo: ${{ steps.vars.outputs.KERNEL_REPO_URL }}"
          KERNEL_SRC_DIR="${GITHUB_WORKSPACE}/kernel_src"
          rm -rf "$KERNEL_SRC_DIR"
          git clone --depth=1 "${{ steps.vars.outputs.KERNEL_REPO_URL }}" "$KERNEL_SRC_DIR"
          if [ -n "${{ steps.vars.outputs.KERNEL_VERSION }}" ]; then
            cd "$KERNEL_SRC_DIR"
            if git rev-parse --verify --quiet "${{ steps.vars.outputs.KERNEL_VERSION }}" >/dev/null; then
              git fetch --depth=1 origin "${{ steps.vars.outputs.KERNEL_VERSION }}" || true
              git checkout --detach "${{ steps.vars.outputs.KERNEL_VERSION }}" || true
            fi
          fi
          echo "KERNEL_PATH=${KERNEL_SRC_DIR}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Determine kernel path (input or cloned)
        id: detect
        run: |
          set -euo pipefail
          # Priority: cloned kernel (KERNEL_PATH from previous step) > kernel_path input > repo root
          if [ -n "${{ steps.vars.outputs.KERNEL_REPO_URL }}" ] && [ -n "${{ steps.vars.outputs.KERNEL_PATH }}" ]; then
            echo "Using cloned kernel path: ${{ steps.vars.outputs.KERNEL_PATH }}"
            echo "KERNEL_PATH_FINAL=${{ steps.vars.outputs.KERNEL_PATH }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          KP="${{ steps.vars.outputs.KERNEL_PATH_INPUT }}"
          if [ -z "$KP" ] || [ "$KP" = "." ]; then
            KP="${GITHUB_WORKSPACE}"
          else
            KP="${GITHUB_WORKSPACE}/$KP"
          fi
          echo "Using kernel path: $KP"
          echo "KERNEL_PATH_FINAL=$KP" >> $GITHUB_OUTPUT

      - name: Set env from detected path
        run: |
          echo "KERNEL_PATH=${{ steps.detect.outputs.KERNEL_PATH_FINAL }}" >> $GITHUB_ENV
          echo "ARCH=${{ steps.vars.outputs.ARCH }}" >> $GITHUB_ENV
          echo "DEFCONFIG=${{ steps.vars.outputs.DEFCONFIG }}" >> $GITHUB_ENV
          echo "CROSS_TOOLCHAIN_URL=${{ steps.vars.outputs.CROSS_TOOLCHAIN_URL }}" >> $GITHUB_ENV
          echo "USE_CCACHE=${{ steps.vars.outputs.USE_CCACHE }}" >> $GITHUB_ENV
          echo "DEVICE=${{ steps.vars.outputs.DEVICE }}" >> $GITHUB_ENV
          echo "KERNEL_VERSION=${{ steps.vars.outputs.KERNEL_VERSION }}" >> $GITHUB_ENV

      - name: Prepare cross toolchain (optional)
        if: env.CROSS_TOOLCHAIN_URL != ''
        run: |
          mkdir -p /opt/cross-toolchain
          cd /opt/cross-toolchain
          echo "Downloading toolchain from ${CROSS_TOOLCHAIN_URL}"
          wget -q -O toolchain.tar.xz "${CROSS_TOOLCHAIN_URL}"
          tar -xf toolchain.tar.xz --strip-components=1
          ls -la /opt/cross-toolchain/bin | sed -n '1,200p'
        shell: bash

      - name: Setup CROSS_COMPILE and environment
        run: |
          if [ -n "${CROSS_TOOLCHAIN_URL}" ]; then
            if ls /opt/cross-toolchain/bin/*aarch64-linux-gnu-* >/dev/null 2>&1; then
              export CROSS_COMPILE=/opt/cross-toolchain/bin/aarch64-linux-gnu-
            else
              export CROSS_COMPILE=/opt/cross-toolchain/bin/aarch64-linux-gnu-
            fi
          else
            if [ "${ARCH}" = "arm64" ]; then
              export CROSS_COMPILE=aarch64-linux-gnu-
            else
              export CROSS_COMPILE=arm-linux-gnueabi-
            fi
          fi
          echo "CROSS_COMPILE=$CROSS_COMPILE" >> $GITHUB_ENV
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

      - name: Optionally enable ccache
        if: env.USE_CCACHE == 'true'
        run: |
          echo "Enabling ccache"
          export CCACHE_DIR=$HOME/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          ccache -M 5G || true
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      - name: Show detected kernel path and files
        run: |
          echo "KERNEL_PATH=$KERNEL_PATH"
          ls -la "$KERNEL_PATH" || true

      - name: Configure kernel (guarded)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          cd "${{ env.KERNEL_PATH }}" || { echo "Kernel path not found: ${{ env.KERNEL_PATH }}"; ls -la "${GITHUB_WORKSPACE}" || true; exit 1; }

          if [ ! -f Makefile ]; then
            echo "ERROR: No top-level Makefile found in kernel path: $(pwd)"
            echo "Contents:"; ls -la || true
            echo "Please set kernel_path to the kernel root (where the top-level Makefile lives) or provide a correct kernel_repo_url."
            exit 1
          fi

          CONFIG_DIR="arch/${ARCH}/configs"
          echo "Listing ${CONFIG_DIR}:"
          if [ -d "$CONFIG_DIR" ]; then
            ls -1 "$CONFIG_DIR" | sed -n '1,200p' || true
          else
            echo "No configs directory at $CONFIG_DIR"
          fi

          if [ -n "${DEFCONFIG}" ]; then
            echo "Using provided defconfig: ${DEFCONFIG}"
            make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} ${DEFCONFIG}
          else
            if [ -f "$CONFIG_DIR/vendor_defconfig" ]; then
              echo "Using vendor_defconfig"
              make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} vendor_defconfig
            elif [ -f "$CONFIG_DIR/msm_defconfig" ]; then
              echo "Using msm_defconfig"
              make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} msm_defconfig
            elif [ -f "$CONFIG_DIR/defconfig" ]; then
              echo "Using defconfig"
              make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} defconfig
            else
              echo "ERROR: No defconfig found. Please provide a defconfig name via the workflow input 'defconfig' or add a defconfig to the kernel tree."
              exit 1
            fi
          fi
        shell: bash

      - name: Build kernel (Image, dtbs, modules)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          echo "Building with $JOBS jobs..."
          if [ "$ARCH" = "arm64" ]; then
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE Image
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE dtbs
          else
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE zImage
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE dtbs
          fi
          make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE modules
        timeout-minutes: 60
        shell: bash

      - name: Package modules
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          mkdir -p tmp_modules
          make O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE modules_install INSTALL_MOD_PATH=$PWD/tmp_modules || true
          tar -C tmp_modules -czf modules.tar.gz .
        shell: bash

      - name: Collect artifacts
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          mkdir -p artifacts
          if [ "$ARCH" = "arm64" ]; then
            cp -v $BUILD_DIR/arch/arm64/boot/Image artifacts/ 2>/dev/null || true
            cp -v $BUILD_DIR/arch/arm64/boot/dts/*/*.dtb artifacts/ 2>/dev/null || true
          else
            cp -v $BUILD_DIR/arch/arm/boot/zImage artifacts/ 2>/dev/null || true
            cp -v $BUILD_DIR/arch/arm/boot/dts/*/*.dtb artifacts/ 2>/dev/null || true
          fi
          cp -v modules.tar.gz artifacts/ || true
          echo "Build completed. Listing artifacts:"
          ls -la artifacts || true
        shell: bash

      - name: Run packaging script if present
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ -f .github/workflows/commands.sh ]; then
            echo "Found .github/workflows/commands.sh — running it"
            chmod +x .github/workflows/commands.sh
            .github/workflows/commands.sh
          else
            echo "No .github/workflows/commands.sh found — skipping packaging script"
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts-${{ github.run_id }}
          path: ${{ env.KERNEL_PATH }}/artifacts

      - name: Upload build metadata (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ github.run_id }}
          path: |
            ${{ env.KERNEL_PATH }}/$BUILD_DIR/.config
            ${{ env.KERNEL_PATH }}/$BUILD_DIR/.version  || true
