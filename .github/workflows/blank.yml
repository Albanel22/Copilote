name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260705/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang llvm lld device-tree-compiler zip unzip curl git python3

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-

      - name: 📂 Injection SusFS / KernelSU & Nettoyage
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -e

          echo "🧹 Purge des anciens résidus de KernelSU..."
          sed -i '/[kK][eE][rR][nN][eE][lL][sS][uU]/d' Makefile || true
          rm -rf drivers/kernelsu || true

          # Clonage de KernelSU v0.9.5
          git clone https://github.com/tiann/KernelSU.git drivers/kernelsu
          cd drivers/kernelsu && git checkout v0.9.5 && rm -rf .git && cd ../..

          echo 'source "drivers/kernelsu/kernel/Kconfig"' >> drivers/Kconfig
          echo "obj-y += kernelsu/kernel/" >> drivers/Makefile

          # Clonage de SusFS
          git clone https://gitlab.com/simonpunk/susfs4ksu.git --depth=1 susfs4ksu
          PATCH_FILE=$(find susfs4ksu/kernel_patches/ -name "*4.19*.patch" | head -n 1)
          
          echo "🧼 Adaptation des chemins dans le patch SusFS..."
          sed -i 's/kernelSU\/ksu\.h/drivers\/kernelsu\/kernel\/ksu\.h/g' "$PATCH_FILE" || true
          sed -i 's/kernelSU/kernelsu/g' "$PATCH_FILE" || true

          echo "🚀 Application du patch SusFS natif..."
          patch -p1 < "$PATCH_FILE" || echo "⚠️ Patch appliqué avec quelques avertissements"

          # Application du patch SusFS sur KernelSU
          if [ -d susfs4ksu/kernel_patches/KernelSU ]; then
            KSU_PATCH=$(find susfs4ksu/kernel_patches/KernelSU/ -name "10_enable_susfs_for_ksu.patch" | head -n 1)
            if [ -f "$KSU_PATCH" ]; then
              cd drivers/kernelsu && patch -p1 < "../../$KSU_PATCH" || echo "⚠️ Patch KSU appliqué" && cd ../..
            fi
          fi

          # Copie des fichiers d'infrastructure SusFS
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/
          if ! grep -q "susfs.o" fs/Makefile; then echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile; fi

          rm -rf susfs4ksu

          echo "🩹 Application des correctifs finaux..."
          
          # 1. Remplacement de vm_flags_t (nouveau) par unsigned long (Kernel 4.19)
          sed -i 's/vm_flags_t/unsigned long/g' include/linux/susfs.h fs/susfs.c || true
          
          # 2. Ajout des vrais headers de Linux pour éviter les "incompatible pointer types"
          sed -i '1i #include <linux/fs.h>\n#include <linux/stat.h>\n#include <linux/sched.h>' include/linux/susfs.h
          
          # 3. KSU v0.9.5 utilise les KPROBES. On efface les vieux appels manuels insérés par le patch SusFS !
          find fs/ -type f -name "*.c" -exec sed -i '/ksu_handle_/d' {} + || true

          # 4. Sécurisation de fs/proc/task_mmu.c au cas où le patch aurait raté un en-tête
          sed -i '1i #include <linux/susfs.h>' fs/proc/task_mmu.c || true
          sed -i '1i #ifndef SUSFS_MAX_LEN_PATHNAME\n#define SUSFS_MAX_LEN_PATHNAME 512\n#endif' fs/proc/task_mmu.c || true

          # Correction adaptative mmap_sem vers mmap_lock (spécifique Android 11+ / Lineage)
          sed -i 's/mmap_sem/mmap_lock/g' fs/proc/base.c fs/proc/task_mmu.c || true

          echo "✅ Fichiers sources prêts à compiler !"

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M ${{ env.CCACHE_SIZE }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KCFLAGS="-Wno-error"
          
          mkdir -p ${{ env.BUILD_DIR }}
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          
          # Forçage strict des configurations requises
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KRETPROBES=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_OVERLAY_FS_REDIRECT_DIR=y"
          } >> ${{ env.BUILD_DIR }}/.config
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          # Hacks de contournement indispensables (Signatures & Dalle Tactile Motorola)
          sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          printf "\n/* --- Début Patch Tactile --- */\n#include <linux/notifier.h>\n#include <linux/module.h>\nstatic BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);\nint panel_register_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_register_notifier);\nint panel_unregister_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_unregister_notifier);\nvoid touch_set_state(int state) { return; }\nEXPORT_SYMBOL(touch_set_state);\n/* --- Fin Patch Tactile --- */\n" >> techpack/display/msm/msm_drv.c
          
          echo "🚀 Lancement de la compilation Image !"
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 KCFLAGS="$KCFLAGS" KSUD_VERSION=11872 KSU_VERSION=11872 -j$(nproc) Image

      - name: Repack & Finalize
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack
          cp boot-stock.img repack/boot.img
          
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so repack/magiskboot
          chmod +x repack/magiskboot
          rm -rf Magisk-v27.0.apk lib/
          
          cd repack
          ./magiskboot unpack boot.img
          cp ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../final_boot.img
          
          cd ..
          mkdir -p final_output
          mv final_boot.img final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_final
          path: final_output/boot.img
