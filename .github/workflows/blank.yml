name: Patch Official Boot with KernelSU

on:
  workflow_dispatch:

env:
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Verify Boot Image
        run: |
          echo "Téléchargement de l'image de boot..."
          curl -fLo boot.img "${{ env.BOOT_URL }}" || { echo "❌ Échec du téléchargement"; exit 1; }
          # Vérification simple de la taille du fichier (doit être > 0)
          [ -s boot.img ] || { echo "❌ Fichier vide"; exit 1; }
          echo "✅ Fichier téléchargé avec succès."

      - name: Setup Tools and Patch
        run: |
          # 1. Récupération de magiskboot
          curl -fLo magiskboot https://github.com/topjohnwu/Magisk/releases/download/v27.0/magiskboot-x86_64
          chmod +x magiskboot
          
          # 2. Nettoyage préventif
          ./magiskboot cleanup
          
          # 3. Extraction de l'image
          echo "Extraction de l'image..."
          ./magiskboot unpack boot.img || { echo "❌ Échec de l'unpack"; exit 1; }
          
          # 4. Patch KernelSU
          echo "Application du patch KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5 || { echo "❌ Échec du patch KernelSU"; exit 1; }
          
          # 5. Repackage sécurisé
          echo "Repackage de l'image..."
          ./magiskboot repack boot.img || { echo "❌ Échec du repack"; exit 1; }
          mv new-boot.img patched-boot.img
          echo "✅ Patch terminé avec succès."
          
      - name: Upload Patched Boot
        uses: actions/upload-artifact@v4
        with:
          name: boot-ksu-final
          path: patched-boot.img
