name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img stock officiel..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort ou invalide pour le boot.img"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Clean Stock Kernel Test (No KSU)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "🧹 Mode diagnostic actif : Aucun patch appliqué."
          echo "📝 Configuration du defconfig d'origine..."
          TARGET_CONFIG="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          if [ ! -f "$TARGET_CONFIG" ]; then
            TARGET_CONFIG="arch/arm64/configs/${{ env.DEFCONFIG }}"
          fi
          echo "✅ Prêt pour un build 100% stock LineageOS."
          
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache Size
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = ${{ env.CCACHE_SIZE }}" > ~/.cache/ccache/ccache.conf

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error"
          
          echo "📥 Injection de la configuration d'origine..."
          cp ../kiev_perfect_defconfig arch/arm64/configs/vendor/kiev_perfect_defconfig

          echo "🔓 FORCE-PASS DES SIGNATURES DANS LE CODE SOURCE (SOCLE BUILD 129 HISTORIQUE) 🔓"
          if [ -f "kernel/module.c" ]; then
            sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          fi

          echo "💉 INJECTION DU CORRECTIF STRNSTR ET RELAIS TACTILE DANS LE TECHPACK 💉"
          if [ -f "techpack/display/msm/msm_drv.c" ]; then
            sed -i 's/strnstr(dev_name(dev), "mdp")/strnstr(dev_name(dev), "mdp", strlen(dev_name(dev)))/g' techpack/display/msm/msm_drv.c
            
            rm -f display_patch.tmp
            echo '#include <linux/notifier.h>' >> display_patch.tmp
            echo '#include <linux/module.h>' >> display_patch.tmp
            echo 'static BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);' >> display_patch.tmp
            echo 'int panel_register_notifier(struct notifier_block *nb) {' >> display_patch.tmp
            echo '    return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);' >> display_patch.tmp
            echo '}' >> display_patch.tmp
            echo 'EXPORT_SYMBOL(panel_register_notifier);' >> display_patch.tmp
            echo 'int panel_unregister_notifier(struct notifier_block *nb) {' >> display_patch.tmp
            echo '    return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);' >> display_patch.tmp
            echo '}' >> display_patch.tmp
            echo 'EXPORT_SYMBOL(panel_unregister_notifier);' >> display_patch.tmp
            
            echo 'void touch_set_state(int state) { return; }' >> display_patch.tmp
            echo 'EXPORT_SYMBOL(touch_set_state);' >> display_patch.tmp
            
            sed -i '/#include "msm_drv.h"/r display_patch.tmp' techpack/display/msm/msm_drv.c
            rm -f display_patch.tmp
          fi

          echo "🟢 INTEGRATION DE KERNELSU-NEXT (OK DEPUIS LOGS) 🟢"
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s

          echo "Fox TÉLÉCHARGEMENT DIRECT DES PATCHS SUSFS VALIDÉS (BUILD 132) Fox"
          mkdir -p susfs_patches
          
          # Téléchargement ciblé depuis la branche master officielle de simonpunk
          curl -fLo susfs_patches/50_add_susfs_for_arch_arm64.patch "https://gitlab.com/simonpunk/susfs4ksu/-/raw/master/kernel_patches/50_add_susfs_for_arch_arm64.patch"
          curl -fLo susfs_patches/fs_susfs.patch "https://gitlab.com/simonpunk/susfs4ksu/-/raw/master/kernel_patches/fs_susfs.patch"
          curl -fLo susfs_patches/ksu_susfs.patch "https://gitlab.com/simonpunk/susfs4ksu/-/raw/master/kernel_patches/ksu_susfs_4.19.y.patch"
          
          # Récupération des fichiers C et H qui complètent le diff des dossiers fs/ et include/
          mkdir -p fs include/linux
          curl -fLo fs/susfs.c "https://gitlab.com/simonpunk/susfs4ksu/-/raw/master/kernel_patches/fs/susfs.c"
          curl -fLo include/linux/susfs.h "https://gitlab.com/simonpunk/susfs4ksu/-/raw/master/kernel_patches/include/linux/susfs.h"

          echo "🚀 APPLICATION CHIRURGICALE DES PATCHS SUSFS 🚀"
          patch -p1 < susfs_patches/50_add_susfs_for_arch_arm64.patch
          patch -p1 < susfs_patches/fs_susfs.patch
          patch -p1 < susfs_patches/ksu_susfs.patch

          echo "💾 FORCE-INJECTION DES CONFIGURATIONS INVISIBLES DANS KIEV_PERFECT_DEFCONFIG 💾"
          TARGET_DEFCONFIG="arch/arm64/configs/vendor/kiev_perfect_defconfig"
          echo "CONFIG_KSU=y" >> "$TARGET_DEFCONFIG"
          echo "CONFIG_KSU_NEXT=y" >> "$TARGET_DEFCONFIG"
          echo "CONFIG_KSU_SUSFS=y" >> "$TARGET_DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$TARGET_DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$TARGET_DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$TARGET_DEFCONFIG"
          
          echo "🛠️ Étape 1 : Génération de la configuration d'origine modifiée..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/kiev_perfect_defconfig

          echo "🚀 Étape 2 : Compilation finale du noyau (Sécurisée V2 + Root Invisible) ..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" -j2 Image
          
      - name: Repack Clean Boot Image
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          ./magiskboot unpack boot.img
          
          ABS_IMAGE_ARM64="${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image"
          cp -v "$ABS_IMAGE_ARM64" kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img "${{ github.workspace }}/boot.img"

      - name: Organize Final Output Artifacts
        run: |
          mkdir -p final_output
          mv "${{ github.workspace }}/boot.img" final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_one_5g_ace-latest
          path: final_output/
