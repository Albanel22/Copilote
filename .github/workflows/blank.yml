name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  # Utilise un lien stable ici, idéalement ton propre fichier boot.img
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        run: |
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          export ARCH=${{ env.ARCH }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LDFLAGS="--threads=1"
          export KCFLAGS="-Wno-error -Wno-incompatible-pointer-types -Wno-int-conversion"
          
          # Injection KernelSU
          rm -rf KernelSU drivers/kernelsu
          git clone https://github.com/midori01/KernelSU.git KernelSU
          cd KernelSU
          git checkout 25a3c38b9890afc3b2971b4cf0ad958a1a43603d
          cd ..
          
          cd drivers
          ln -sf ../KernelSU/kernel kernelsu
          cd ..
          sed -i '1i obj-y += kernelsu/' drivers/Makefile
          printf '\nmenu "KernelSU"\nconfig KSU\n\tbool "Enable KernelSU"\n\tdefault y\nendmenu\n' >> drivers/Kconfig
          
          # Config KPROBES et allègement réseau pour économie RAM
          sed -i '/CONFIG_KSU/d; /CONFIG_KPROBES/d; /CONFIG_HAVE_KPROBES/d; /CONFIG_KPROBE_EVENTS/d' arch/arm64/configs/vendor/${{ env.DEFCONFIG }}
          echo -e "\nCONFIG_KSU=y\nCONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/vendor/${{ env.DEFCONFIG }}
          
          sed -i 's/CONFIG_NET_L2TP=y/CONFIG_NET_L2TP=n/; s/CONFIG_IP_SCTP=y/CONFIG_IP_SCTP=n/; s/CONFIG_IP_DCCP=y/CONFIG_IP_DCCP=n/; s/CONFIG_RDS=y/CONFIG_RDS=n/' arch/arm64/configs/vendor/${{ env.DEFCONFIG }}
          
          make O=../${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/${{ env.DEFCONFIG }}
          make O=../${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE olddefconfig
          
          echo "🚀 Compilation ultra-optimisée RAM..."
          make O=../${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE LDFLAGS="$LDFLAGS" KCFLAGS="$KCFLAGS" -j2 Image.gz-dtb

      - name: Repack Boot Image with Magiskboot
        run: |
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          curl -fLo magiskboot https://github.com/topjohnwu/Magisk/releases/download/v27.0/magiskboot
          chmod +x magiskboot
          
          ./magiskboot unpack boot.img
          # Important : on utilise le fichier compressé avec DTB
          cp ../${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image.gz-dtb kernel
          ./magiskboot repack boot.img
          # On renomme directement en boot.img
          mv new-boot.img ../boot.img

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-kernelsu
          path: boot.img
