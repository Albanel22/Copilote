name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      boot_stock_url:
        description: 'Lien direct URL du boot.img officiel (ex: LineageOS)'
        required: false
        default: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: kiev_defconfig
  CCACHE_SIZE: 5G

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Workflow Variables
        id: vars
        run: |
          # Priorité à l'URL manuelle, sinon utilise la version par défaut du 28 juin
          INPUT_URL="${{ github.event.inputs.boot_stock_url }}"
          if [ -z "$INPUT_URL" ]; then
            INPUT_URL="https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img"
          fi
          echo "BOOT_URL=${INPUT_URL}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libtinfo5 libncurses5-dev alterator-fbi zip unzip curl git

      - name: Download Stock Boot Image if URL provided
        run: |
          set -euo pipefail
          URL_BOOT="${{ steps.vars.outputs.BOOT_URL }}"
          echo "📥 Téléchargement du boot.img stock depuis : $URL_BOOT"
          curl -fLo boot-stock.img "$URL_BOOT" || { echo "⚠️ Lien mort ou invalide pour le boot.img"; exit 1; }
        shell: bash

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/the-dise/android_kernel_motorola_sm7225.git --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache Size
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = ${{ env.CCACHE_SIZE }}" > ~/.cache/ccache/ccache.conf

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          
          # 1. Configuration initiale
          make O=${{ env.BUILD_DIR }} ${{ env.DEFCONFIG }}
          
          # 2. Compilation des DTB matériels
          make O=${{ env.BUILD_DIR }} -j$(nproc) dtbs
          
          # 3. Compilation du Noyau principal et des Modules annexes
          make O=${{ env.BUILD_DIR }} -j$(nproc)

      - name: Install & package modules
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          mkdir -p tmp_modules
          make O=${{ env.BUILD_DIR }} INSTALL_MOD_PATH=../tmp_modules modules_install
          cd ../tmp_modules
          tar -czf ../modules.tar.gz .
        shell: bash

      - name: Repack Boot Image with Magiskboot
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -f "boot-stock.img" ]; then
            echo "⚠️ boot-stock.img absent. Étape d'injection annulée."
            exit 1
          fi
          
          echo "🔥 boot-stock.img détecté ! Préparation de l'injection..."
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          
          echo "📥 Téléchargement sécurisé de magiskboot via l'APK officielle..."
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          ./magiskboot unpack boot.img
          
          KROOT="${{ env.KERNEL_PATH }}"
          if [ -f "$KROOT/$BUILD_DIR/arch/arm64/boot/Image" ]; then
            cp -v "$KROOT/$BUILD_DIR/arch/arm64/boot/Image" kernel
          elif [ -f "$KROOT/$BUILD_DIR/arch/arm/boot/zImage" ]; then
            cp -v "$KROOT/$BUILD_DIR/arch/arm/boot/zImage" kernel
          fi
          
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../boot.img
          echo "✅ Nouveau boot.img créé avec succès !"
        shell: bash

      - name: Organize Final Output Artifacts
        run: |
          mkdir -p final_output/dtbs
          
          # On déplace le boot.img réinjecté s'il existe, sinon le kernel brut
          if [ -f "boot.img" ]; then
            mv boot.img final_output/boot.img
            echo "📦 boot.img réinjecté ajouté au package final."
          fi
          
          if [ -f "${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image" ]; then
            cp "${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image" final_output/kernel.img
          fi
          
          if [ -f "modules.tar.gz" ]; then
            mv modules.tar.gz final_output/
          fi
          
          find ${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/${{ env.ARCH }}/boot/dts/ -name "*.dtb" -exec cp {} final_output/dtbs/ \;

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_one_5g_ace-latest
          path: final_output/
