name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang llvm lld device-tree-compiler zip unzip curl git python3

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-



      - name: 📂 Préparation du defconfig et Injection SusFS/KSU
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          # 1. Laisser d'abord le script ou le système faire son initialisation si nécessaire
          # (Si vous aviez des commandes spécifiques au début de cette étape, laissez-les ici)

          set -e

          echo "🚀 [CONTOURNEMENT] Injection immédiate de KernelSU et SusFS pré-build..."
          
          # Nettoyage de sécurité avant injection
          rm -rf drivers/kernelsu || true
          sed -i '/[kK][eE][rR][nN][eE][lL][sS][uU]/d' drivers/Makefile || true
          sed -i '/[kK][eE][rR][nN][eE][lL][sS][uU]/d' drivers/Kconfig || true

          # Clonage et fixation de KernelSU
          git clone https://github.com/tiann/KernelSU.git drivers/kernelsu
          cd drivers/kernelsu && git checkout v0.9.5 && rm -rf .git && cd ../..

          # Liaison au système de build
          echo 'source "drivers/kernelsu/kernel/Kconfig"' >> drivers/Kconfig
          echo "obj-y += kernelsu/kernel/" >> drivers/Makefile


          # Clonage de SusFS et application du patch Kernel
          git clone https://gitlab.com/simonpunk/susfs4ksu.git --depth=1 susfs4ksu
          PATCH_FILE=$(find susfs4ksu/kernel_patches/ -name "*4.19*.patch" | head -n 1)
          patch -p1 < "$PATCH_FILE" || echo "⚠️ Des hunks ont échoué comme prévu..."

          # Application du patch d'activation dans KernelSU
          KSU_PATCH=$(find susfs4ksu/kernel_patches/KernelSU/ -name "10_enable_susfs_for_ksu.patch" | head -n 1)
          KSU_PATCH_ABS=$(pwd)/$KSU_PATCH
          cd drivers/kernelsu && patch -p1 < "$KSU_PATCH_ABS" || true && cd ../..

          # Correction chirurgicale via Python
          python3 -c 'import sys, textwrap; print(textwrap.dedent(sys.stdin.read()))' << 'EOF' > fix_susfs.py
          import os
          import re

          if os.path.exists('fs/open.c'):
              with open('fs/open.c', 'r') as f: code = f.read()
              idx = code.find("long do_faccessat(int dfd, const char __user *filename, int mode)")
              if idx != -1:
                  brace_idx = code.find("{", idx)
                  if brace_idx != -1 and "struct filename* fname;" not in code:
                      var_inj = "\n#ifdef CONFIG_KSU_SUSFS_SUS_PATH\n\tstruct filename* fname;\n\tint status;\n\tint error;\n#endif\n"
                      code = code[:brace_idx+1] + var_inj + code[brace_idx+1:]
              if "if (mode & ~S_IRWXO)" in code and "susfs_sus_path_by_filename" not in code:
                  hook_inj = "#ifdef CONFIG_KSU_SUSFS_SUS_PATH\n\tfname = getname_safe(filename);\n\tstatus = susfs_sus_path_by_filename(fname, &error, SYSCALL_FAMILY_ALL_ENOENT);\n\tputname_safe(fname);\n\tif (status) {\n\t\treturn error;\n\t}\n#endif\n\n\t"
                  code = code.replace("if (mode & ~S_IRWXO)", hook_inj + "if (mode & ~S_IRWXO)")
              with open('fs/open.c', 'w') as f: f.write(code)

          if os.path.exists('fs/proc/task_mmu.c'):
              with open('fs/proc/task_mmu.c', 'r') as f: code = f.read()
              if '#include "internal.h"' in code and "linux/susfs.h" not in code:
                  code = code.replace('#include "internal.h"', '#include "internal.h"\n#ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif\n')
              with open('fs/proc/task_mmu.c', 'w') as f: f.write(code)

          hook_path = 'drivers/kernelsu/kernel/core_hook.c'
          if os.path.exists(hook_path):
              with open(hook_path, 'r') as f: code = f.read()
              if "susfs_try_umount_all" not in code:
                  code = re.sub(r'int ksu_handle_setuid\(struct cred \*new,\s*const struct cred \*old\).*$', '', code, flags=re.DOTALL)
                  fixed_lines = [
                      "","#ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT","void susfs_try_umount_all(uid_t uid) {","\tsusfs_try_umount(uid);","\tksu_try_umount(\"/system\", true, 0, uid);","\tksu_try_umount(\"/system_ext\", true, 0, uid);","\tksu_try_umount(\"/vendor\", true, 0, uid);","\tksu_try_umount(\"/product\", true, 0, uid);","\tksu_try_umount(\"/odm\", true, 0, uid);","\tksu_try_umount(\"/data/adb/modules\", false, MNT_DETACH, uid);","\tksu_try_umount(\"/debug_ramdisk\", true, MNT_DETACH, uid);","}","#endif","",
                      "int ksu_handle_setuid(struct cred *new, const struct cred *old)","{","\tif (!ksu_module_mounted) return 0;","\tif (!new || !old) return 0;","\tkuid_t new_uid = new->uid; kuid_t old_uid = old->uid;","\tif (0 != old_uid.val) return 0;",
                      "#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT","\tif (likely(susfs_is_sid_equal(old->security, susfs_zygote_sid))) {","\t\tif (unlikely(new_uid.val < 10000 && new_uid.val >= 1000)) {","\t\t\tif (susfs_is_umount_for_zygote_system_process_enabled) goto out_ksu_try_umount;","\t\t}","\t}","#endif",
                      "\tif (is_non_appuid(new_uid)) return 0;",
                      "#ifdef CONFIG_KSU_SUSFS","\telse { task_lock(current); current->susfs_task_state |= TASK_STRUCT_NON_ROOT_USER_APP_PROC; task_unlock(current); }","#endif",
                      "#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT","out_ksu_try_umount:","#endif",
                      "\tif (!ksu_uid_should_umount(new_uid.val)) return 0;",
                      "\telse {","#ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT","\t\tsusfs_try_umount_all(new_uid.val);","#else","\t\ttry_umount(\"/system\", true, 0); try_umount(\"/vendor\", true, 0); try_umount(\"/product\", true, 0); try_umount(\"/data/adb/modules\", false, MNT_DETACH);","#endif","\t}","\treturn 0;","}"
                  ]
                  code += "\n".join(fixed_lines)
                  with open(hook_path, 'w') as f: f.write(code)
          EOF
          python3 fix_susfs.py && rm fix_susfs.py

          # Copie des fichiers d'infrastructure SusFS
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/
          if ! grep -q "susfs.o" fs/Makefile; then echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile; fi
          rm -rf susfs4ksu

          echo "✅ [Injection terminée] Lancement immédiat de la configuration du Noyau..."

          # 2. EXECUTION DU MAKE DEFCONFIG (Vos lignes d'origine inchangées)
          # Le moteur de build n'a plus le temps ni l'opportunité de nettoyer quoi que ce soit.
          make O=out ARCH=arm64 lito-perf_defconfig
    
      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M ${{ env.CCACHE_SIZE }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KCFLAGS="-Wno-error"
          
          echo "📂 Préparation du defconfig..."
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          
          # Fix préventif de l'arborescence out/ pour le compilateur Kconfig (Évite l'erreur can't open file)
          mkdir -p ${{ env.BUILD_DIR }}/drivers/kernelsu
          cp drivers/kernelsu/Kconfig ${{ env.BUILD_DIR }}/drivers/kernelsu/Kconfig 2>/dev/null || true

          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          
          echo "🔧 Injection forcée des flags requis..."
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KRETPROBES=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_OVERLAY_FS_REDIRECT_DIR=y"
          } >> ${{ env.BUILD_DIR }}/.config
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          echo "🔓 Force-pass des signatures & Tactile..."
          sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          printf "\n/* --- Début Patch Tactile --- */\n#include <linux/notifier.h>\n#include <linux/module.h>\nstatic BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);\nint panel_register_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_register_notifier);\nint panel_unregister_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_unregister_notifier);\nvoid touch_set_state(int state) { return; }\nEXPORT_SYMBOL(touch_set_state);\n/* --- Fin Patch Tactile --- */\n" >> techpack/display/msm/msm_drv.c
          
          echo "🚀 Compilation finale (Forçage variable 11872)..."
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 KCFLAGS="$KCFLAGS" KSUD_VERSION=11872 KSU_VERSION=11872 -j$(nproc) Image

      - name: Repack & Finalize
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack
          cp boot-stock.img repack/boot.img
          
          # Téléchargement et préparation de magiskboot depuis l'APK officielle
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so repack/magiskboot
          chmod +x repack/magiskboot
          
          rm -rf Magisk-v27.0.apk lib/
          
          # Repackage
          cd repack
          ./magiskboot unpack boot.img
          
          cp ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image kernel
          
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../final_boot.img
          
          cd ..
          mkdir -p final_output
          mv final_boot.img final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_final
          path: final_output/boot.img
