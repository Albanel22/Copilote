name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang llvm lld device-tree-compiler zip unzip curl git python3

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Erreur download"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: ${{ runner.os }}-ccache-

      - name: Injecter KernelSU & SUSFS Dynamiquement
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          # 1. Nettoyage complet des sources
          git reset --hard
          git clean -fd

          # 🛠️ INSTALLATION MANUELLE DE KERNELSU DANS DRIVERS
          echo "📥 Clonage propre de KernelSU v0.9.5..."
          git clone https://github.com/tiann/KernelSU.git -b v0.9.5 KernelSU_tmp
          
          echo "📦 Injection du sous-ensemble de KernelSU dans drivers/kernelsu..."
          mv KernelSU_tmp/kernel drivers/kernelsu
          rm -rf KernelSU_tmp

          echo "🔧 Liaison de KernelSU au système de build officiel..."
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          echo "obj-y += kernelsu/" >> drivers/Makefile

          # 2. Détection dynamique de la version du Kernel
          VERSION=$(grep -E "^VERSION =" Makefile | head -n 1 | awk '{print $3}')
          PATCHLEVEL=$(grep -E "^PATCHLEVEL =" Makefile | head -n 1 | awk '{print $3}')
          KERNEL_VER="${VERSION}.${PATCHLEVEL}"
          echo "📊 Version du Kernel détectée : ${KERNEL_VER}"

          # 3. Sélection et clonage de la branche SUSFS correspondante
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "kernel-${KERNEL_VER}" --depth=1 susfs4ksu || {
            echo "⚠️ Branche kernel-${KERNEL_VER} introuvable, repli sur la branche principale..."
            git clone https://gitlab.com/simonpunk/susfs4ksu.git --depth=1 susfs4ksu
          }
          
          # 4. Détection dynamique des chemins pour KernelSU
          CORE_HOOK=$(find . -name "core_hook.c" | head -n 1)
          KSU_C=$(find . -name "ksu.c" | head -n 1)
          KSU_H=$(find . -type f -name "ksu.h" | grep -E "kernel/|drivers/" | head -n 1)
          RULES_C=$(find . -name "rules.c" | grep "selinux" | head -n 1)
          KSU_ROOT=$(dirname "$CORE_HOOK")

          echo "✅ Fichiers KernelSU trouvés : $CORE_HOOK, $KSU_C, $KSU_H, $RULES_C"

          # Alignement structurel requis pour KernelSU
          mkdir -p kernelSU
          cp "$KSU_H" kernelSU/ksu.h

          # 🛠️ STRATÉGIE DE COPIE DES HEADERS SUSFS
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/ 2>/dev/null || cp $(find susfs4ksu/ -name "susfs.c") fs/
          
          if [ -d "susfs4ksu/kernel_patches/include" ]; then
            cp -r susfs4ksu/kernel_patches/include/* include/
            echo "✅ Arborescence complète des fichiers d'en-tête SUSFS intégrée."
          else
            echo "⚠️ Structure alternative détectée dans l'arborescence SUSFS, répartition manuelle..."
            mkdir -p include/linux include/uapi/linux
            find susfs4ksu/ -name "susfs.h" | while read -r f; do
              if [[ "$f" == *"uapi"* ]]; then
                cp "$f" include/uapi/linux/
              else
                cp "$f" include/linux/
              fi
            done
            find susfs4ksu/ -name "susfs_def.h" -exec cp {} include/linux/ \; 2>/dev/null || true
          fi

          echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile

          # 🔧 FORCE-DEFINE & VISIBILITÉ DES TYPES POUR LE COMPILATEUR
          [ -f include/linux/susfs.h ] && sed -i '1i #define CONFIG_KSU 1\n#define CONFIG_KSU_SUSFS 1\n#include <linux/mm.h>\n#include <linux/fs.h>\nstruct filename;' include/linux/susfs.h
          [ -f include/uapi/linux/susfs.h ] && sed -i '1i #define CONFIG_KSU 1\n#define CONFIG_KSU_SUSFS 1\n#include <linux/mm.h>\n#include <linux/fs.h>\nstruct filename;' include/uapi/linux/susfs.h

          # 🛠️ INJECTION DES FALLBACKS ADAPTATIFS DANS LES HEADERS
          if [ -f include/linux/susfs.h ]; then
            cat << 'EOF' >> include/linux/susfs.h

/* --- Début Fallbacks de Compatibilité Moteur SUSFS Modernes --- */
#ifndef SYSCALL_FAMILY_ALL_ENOENT
#define SYSCALL_FAMILY_ALL_ENOENT 0
#endif

#ifndef SUSFS_DONT_LOG
#define SUSFS_DONT_LOG 0
#endif

#ifndef SYSCALL_FAMILY_ALL_EACCES
#define SYSCALL_FAMILY_ALL_EACCES 1
#endif

#include <linux/types.h>
#ifdef CONFIG_KSU_SUSFS
extern int susfs_sus_path_by_filename(struct filename *fname, int *error, int syscall_family);
void ksu_try_umount(const char *mnt, bool check_mnt, int flags, uid_t uid);
#else
static inline int susfs_sus_path_by_filename(struct filename *fname, int *error, int syscall_family) { return 0; }
static inline void ksu_try_umount(const char *mnt, bool check_mnt, int flags, uid_t uid) {}
#endif
/* --- Fin Fallbacks --- */
EOF
            echo "✅ Fallbacks de sécurité et prototype ksu_try_umount injectés dans include/linux/susfs.h"
          fi

          # 🛠️ SÉCURISATION DU LINKER
          if [ -f fs/susfs.c ]; then
            if ! grep -q "susfs_sus_path_by_filename" fs/susfs.c; then
              cat << 'EOF' >> fs/susfs.c

/* Stub adaptatif généré automatiquement pour satisfaire les hooks du dépôt */
int susfs_sus_path_by_filename(struct filename *fname, int *error, int syscall_family) {
    return 0;
}
EOF
              echo "✅ Stub de liaison injecté dans fs/susfs.c"
            fi
          fi

          # Patch ciblé pour fs/open.c
          python3 -c '
          import re
          file_path = "fs/open.c"
          with open(file_path, "r") as f:
              code = f.read()
          
          extern_decl = "\n#ifdef CONFIG_KSU\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif\n"
          if "ksu_handle_faccessat" in code and "extern int ksu_handle_faccessat" not in code:
              code = code.replace("long do_faccessat", extern_decl + "long do_faccessat")
              print("🎉 Prototype de ksu_handle_faccessat injecté.")
          
          pattern = r"(long\s+do_faccessat\s*\([^)]+\)\s*\{)"
          match = re.search(pattern, code)
          if match:
              func_start_idx = match.end()
              local_window = code[func_start_idx:func_start_idx+400]
              
              variables_to_inject = ""
              if "struct path path;" not in local_window:
                  variables_to_inject += "\n\tstruct path path;"
              if "struct inode *inode;" not in local_window:
                  variables_to_inject += "\n\tstruct inode *inode;"
              if "struct vfsmount *mnt;" not in local_window:
                  variables_to_inject += "\n\tstruct vfsmount *mnt;"
                  
              if variables_to_inject:
                  code = code[:func_start_idx] + variables_to_inject + code[func_start_idx:]
                  print("🎉 Variables locales injectées avec succès dans do_faccessat !")
          
          with open(file_path, "w") as f:
              f.write(code)
          '

          # 5. Injection dans Kconfig et Makefile de KernelSU
          cat << 'EOF' >> "$KSU_ROOT/Kconfig"
menu "KernelSU - SUSFS"
config KSU_SUSFS
    bool "KernelSU addon - SUSFS"
    depends on KSU
    default y
config KSU_SUSFS_SUS_PATH
    bool "Enable to hide suspicious path"
    depends on KSU_SUSFS
    default y
config KSU_SUSFS_TRY_UMOUNT
    bool "Enable to use ksu's try_umount"
    depends on KSU_SUSFS
    default y
endmenu
EOF

          cat << 'EOF' >> "$KSU_ROOT/Makefile"
ifdef KSU_SUSFS
ccflags-y += -DKSU_SUSFS
endif
ifdef KSU_SUSFS_SUS_PATH
ccflags-y += -DKSU_SUSFS_SUS_PATH
endif
ifdef KSU_SUSFS_TRY_UMOUNT
ccflags-y += -DKSU_SUSFS_TRY_UMOUNT
endif
EOF

          # 6. Injections des hooks KernelSU essentiels
          sed -i '/#include "kernel_compat.h"/a #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' "$CORE_HOOK"
          sed -i '/try_umount("\/system"/i #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT\n\tsusfs_try_umount(new_uid.val);\n#endif' "$CORE_HOOK"
          sed -i '/ksu_core_init();/i #ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif' "$KSU_C"
          sed -i '/ksu_allow(db, "system_server", KERNEL_SU_DOMAIN, "process", "sigkill");/a #ifdef CONFIG_KSU_SUSFS\n\tksu_allow(db, "zygote", "labeledfs", "filesystem", "unmount");\n#endif' "$RULES_C"

          # 7. 🛠️ CRÉATION DU PONT DE LIAISON API
          echo -e "\n/* --- Pont de liaison SusFS <-> KernelSU --- */\nvoid ksu_try_umount(const char *mnt, bool check_mnt, int flags, uid_t uid) {\n\ttry_umount(mnt, check_mnt, flags);\n}" >> "$CORE_HOOK"
          echo "🎉 Pont d'API pour ksu_try_umount greffé à la fin de $CORE_HOOK"

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M ${{ env.CCACHE_SIZE }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KCFLAGS="-Wno-error"
          
          echo "📂 Préparation du defconfig..."
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          
          echo "🔧 Injection forcée des flags requis..."
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KRETPROBES=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_OVERLAY_FS_REDIRECT_DIR=y"
          } >> ${{ env.BUILD_DIR }}/.config
          
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          echo "🔓 Force-pass des signatures & Tactile..."
          sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          printf "\n/* --- Début Patch Tactile --- */\n#include <linux/notifier.h>\n#include <linux/module.h>\nstatic BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);\nint panel_register_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_register_notifier);\nint panel_unregister_notifier(struct notifier_block *nb) {\n    return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);\n}\nEXPORT_SYMBOL(panel_unregister_notifier);\nvoid touch_set_state(int state) { return; }\nEXPORT_SYMBOL(touch_set_state);\n/* --- Fin Patch Tactile --- */\n" >> techpack/display/msm/msm_drv.c
          
          echo "🚀 Compilation finale..."
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 KCFLAGS="$KCFLAGS" -j$(nproc) Image

      - name: Repack & Finalize
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack
          cp boot-stock.img repack/boot.img
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so repack/magiskboot
          chmod +x repack/magiskboot
          cd repack
          ./magiskboot unpack boot.img
          cp ${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img ../final_boot.img
          cd ..
          mkdir -p final_output
          mv final_boot.img final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_final
          path: final_output/boot.img
