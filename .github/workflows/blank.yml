name: 🚀 Build Kernel with ReSukiSU Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  KERNEL_REPO: https://github.com/Albanel22/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_PATH: kernel_src
  DEFCONFIG: vendor/lito-perf_defconfig
  BOOT_IMG_URL: https://mirrorbits.lineageos.org/full/kiev/20260705/boot.img

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Environment & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison ca-certificates curl flex gcc-aarch64-linux-gnu git libssl-dev libelf-dev python3 python3-pip rsync zlib1g-dev wget unzip

      - name: 📥 Download Kernel Source & Official Boot.img
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} ${{ env.KERNEL_PATH }}
          wget -O boot.img ${{ env.BOOT_IMG_URL }}

      - name: 📂 Intégration de ReSukiSU & Application Propre des Hooks
        run: |
          set -e
          cd ${{ env.KERNEL_PATH }}

          echo "🧼 Nettoyage des dossiers temporaires..."
          rm -rf drivers/kernelsu kernelSU || true

          echo "📥 Téléchargement de ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          cd drivers/kernelsu && rm -rf .git && cd ../..

          # NEUTRALISATION TOTALE DES VÉRIFICATIONS DE HOOKS QUI BLOQUENT
          rm -f drivers/kernelsu/kernel/tools/inline_hook_check.mk || true
          mkdir -p drivers/kernelsu/kernel/tools
          touch drivers/kernelsu/kernel/tools/inline_hook_check.mk

          if ! grep -q "kernelsu" drivers/Kconfig; then echo 'source "drivers/kernelsu/kernel/Kconfig"' >> drivers/Kconfig; fi
          if ! grep -q "kernelsu" drivers/Makefile; then echo "obj-y += kernelsu/kernel/" >> drivers/Makefile; fi

          echo "🩹 Application du patch global KernelSU (kernel-4.19_5.4.patch)..."
          if [ -f ../patches/kernel-4.19_5.4.patch ]; then
            git apply ../patches/kernel-4.19_5.4.patch || patch -p1 < ../patches/kernel-4.19_5.4.patch || true
          else
            echo "❌ Erreur : Le patch global est introuvable dans le dossier patches/ !"
            exit 1
          fi

          echo "🔧 Correction des chemins d'en-tête pour pointer vers drivers/kernelsu..."
          find fs/ drivers/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|../kernelSU/|../drivers/kernelsu/|g' {} + || true
          find fs/ drivers/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"ksu.h"|"drivers/kernelsu/ksu.h"|g' {} + || true

          echo "🔧 Correction de fsnotify_ops pour le noyau 4.19 dans pkg_observer.c..."
          if [ -f drivers/kernelsu/manager/pkg_observer.c ]; then
            sed -i 's/\.handle_inode_event/\.handle_event/g' drivers/kernelsu/manager/pkg_observer.c || true
          fi

          echo "⚙️ Configuration du defconfig..."
          make O=out ARCH=arm64 ${{ env.DEFCONFIG }}
          
          echo "🔧 Activation de KernelSU dans le .config..."
          scripts/config --file out/.config --enable CONFIG_KSU
          scripts/config --file out/.config --disable CONFIG_KSU_SUSFS || true
          
          echo "🛡️ Configuration de ReSukiSU pour un noyau Non-GKI..."
          if [ -f drivers/kernelsu/Kbuild ]; then
            sed -i 's/CONFIG_KSU_SUSFS=y/# CONFIG_KSU_SUSFS is not set/g' drivers/kernelsu/Kbuild || true
            sed -i '/TP hooks are incompatible/s/^/#/' drivers/kernelsu/Kbuild || true
          fi

          echo "🚀 Lancement de la compilation du noyau..."
          make -j$(nproc) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- HOSTCC=gcc HOSTCXX=g++ KCFLAGS="-Wno-error" HOSTCFLAGS="-Wno-error"

          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "❌ Erreur : Image du noyau introuvable."
            exit 1
          fi

          echo "📦 Repackage automatique avec magiskboot..."
          cd ..
          curl -LO https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
          unzip Magisk-v27.0.apk lib/armeabi-v7a/libmagiskboot.so
          mv lib/armeabi-v7a/libmagiskboot.so magiskboot
          chmod +x magiskboot

          ./magiskboot unpack boot.img
          cp ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/Image kernel
          ./magiskboot repack boot.img
          
          mkdir -p output_artifacts
          if [ -f new-boot.img ]; then
            cp new-boot.img output_artifacts/boot.img
            echo "✅ boot.img généré et renommé avec succès !"
          else
            echo "❌ Erreur lors du repackage du boot.img"
            exit 1
          fi
          
      - name: 📤 Upload du new-boot.img Prêt à Flasher
        uses: actions/upload-artifact@v4
        with:
          name: motorola-kiev-boot
          path: output_artifacts/boot.img
