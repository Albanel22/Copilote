name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img stock officiel..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort ou invalide pour le boot.img"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/Albanel22/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache Size
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = ${{ env.CCACHE_SIZE }}" > ~/.cache/ccache/ccache.conf

      - name: Integrate KernelSU
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          [ -d "KernelSU" ] || { echo "❌ Échec KernelSU"; exit 1; }

      - name: Integrate SUSFS
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          
          # On applique le patch en autorisant l'échec (|| true)
          patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true
          
          # IMPORTANT : On supprime les fichiers .rej créés par les échecs
          # Cela permet à l'étape suivante (Surgical Injection) de travailler sur des fichiers propres
          rm -f fs/open.c.rej fs/proc/task_mmu.c.rej
          echo "✅ Fichiers .rej nettoyés, les injections chirurgicales vont prendre le relais."
          
      - name: Clean Failed Patch Artifacts
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "🧹 Nettoyage des résidus de patch..."
          rm -f fs/open.c.rej fs/proc/task_mmu.c.rej
          # Note : Si le patch a partiellement modifié les fichiers, 
          # les sed suivants sont assez intelligents pour ignorer les doublons 
          # s'ils sont bien codés, mais il est préférable de ne pas avoir de fichiers .rej qui traînent.
          
      - name: Surgical Injection for SUSFS
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          # Injection via heredoc (plus stable que sed)
          cat <<EOF > susfs_patch.h
          #ifdef CONFIG_KSU_SUSFS
          #include <linux/susfs.h>
          #endif
          EOF
          # Patch task_mmu.c
          sed -i '/#include <asm\/tlbflush.h>/r susfs_patch.h' fs/proc/task_mmu.c
          
          # Patch open.c - Injection Header
          cat <<EOF > open_header.h
          #ifdef CONFIG_KSU_SUSFS_SUS_PATH
          struct filename* fname;
          int status;
          int error;
          #endif
          EOF
          sed -i '/struct vfsmount \*mnt;/r open_header.h' fs/open.c
          
          # Patch open.c - Injection Hook
          cat <<EOF > open_hook.h
          #ifdef CONFIG_KSU_SUSFS_SUS_PATH
          fname = getname_safe(filename);
          status = susfs_sus_path_by_filename(fname, &error, SYSCALL_FAMILY_ALL_ENOENT);
          putname_safe(fname);
          if (status) {
              return error;
          }
          #endif
          EOF
          sed -i '/ksu_handle_faccessat(&dfd, &filename, &mode, NULL);/r open_hook.h' fs/open.c
          echo "✅ Injections chirurgicales SUSFS appliquées !"

      - name: Verify Patch Injection
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          grep -q "CONFIG_KSU_SUSFS_SUS_PATH" fs/open.c || { echo "❌ ERREUR: SUSFS fs/open.c"; exit 1; }
          grep -q "CONFIG_KSU_SUSFS" fs/proc/task_mmu.c || { echo "❌ ERREUR: SUSFS fs/task_mmu.c"; exit 1; }
          echo "✅ Injections vérifiées."
          
      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KCFLAGS="-Wno-error"
          
          # 1. Copier le defconfig à l'emplacement attendu par le Makefile
          echo "📂 Préparation du defconfig..."
          cp arch/arm64/configs/vendor/${{ env.DEFCONFIG }} arch/arm64/configs/${{ env.DEFCONFIG }}
          
          CONFIG_FILE="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          
          echo "🔧 Activation de KernelSU et SUSFS dans $CONFIG_FILE..."
          echo "CONFIG_KSU=y" >> $CONFIG_FILE
          echo "CONFIG_KSU_SUSFS=y" >> $CONFIG_FILE
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $CONFIG_FILE
          
          echo "🛠️ Génération de la configuration..."
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 ${{ env.DEFCONFIG }}
          
          echo "🔓 FORCE-PASS DES SIGNATURES..."
          if [ -f "kernel/module.c" ]; then
            sed -i 's/if (!check_version(/if (0 \&\& !check_version(/g' kernel/module.c
          fi
          
          echo "💉 INJECTION DU CORRECTIF TACTILE (SÉCURISÉ)..."
          if [ -f "techpack/display/msm/msm_drv.c" ]; then
            # 1. Nettoyage de la syntaxe existante (au cas où)
            sed -i 's/strnstr(dev_name(dev), "mdp")/strnstr(dev_name(dev), "mdp", strlen(dev_name(dev)))/g' techpack/display/msm/msm_drv.c
            
            # 2. Append (ajouter à la fin) du code au lieu d'injecter au milieu
            cat << 'EOF' >> techpack/display/msm/msm_drv.c/* --- Début Patch Tactile --- */
            #include <linux/notifier.h>
            #include <linux/module.h>
            static BLOCKING_NOTIFIER_HEAD(motorola_panel_notifier_list);int panel_register_notifier(struct notifier_block *nb) {return blocking_notifier_chain_register(&motorola_panel_notifier_list, nb);}
            EXPORT_SYMBOL(panel_register_notifier);int panel_unregister_notifier(struct notifier_block *nb) {return blocking_notifier_chain_unregister(&motorola_panel_notifier_list, nb);}
            EXPORT_SYMBOL(panel_unregister_notifier);void touch_set_state(int state) { return; }
            EXPORT_SYMBOL(touch_set_state);
            /* --- Fin Patch Tactile --- */
            EOF
            echo "✅ Patch tactile ajouté à la fin du fichier."
          fi
          
          echo "🚀 Compilation finale du noyau..."
          make O=${{ env.BUILD_DIR }} LLVM=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 KCFLAGS="$KCFLAGS" -j$(nproc) Image
          
      - name: Package with Magiskboot
        run: |
          echo "📦 Préparation du packaging avec Magiskboot..."
          
          # 1. Téléchargement de magiskboot (version stable)
          curl -LO https://github.com/topjohnwu/Magisk/releases/download/v27.0/magiskboot-arm64
          chmod +x magiskboot-arm64
          mv magiskboot-arm64 magiskboot
          
          # 2. Décompression du boot stock (doit être présent suite au téléchargement)
          if [ -f "boot-stock.img" ]; then
            ./magiskboot unpack boot-stock.img
          else
            echo "❌ ERREUR: boot-stock.img introuvable !"
            exit 1
          fi
          
          # 3. Remplacement du noyau stock par notre noyau patché
          # On vérifie que le fichier Image a bien été généré
          IMAGE_PATH="${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image"
          if [ -f "$IMAGE_PATH" ]; then
            cp "$IMAGE_PATH" kernel
            echo "✅ Noyau injecté dans le boot.img"
          else
            echo "❌ ERREUR: Image du noyau non trouvée à $IMAGE_PATH"
            exit 1
          fi
          
          # 4. Repackage
          ./magiskboot repack boot-stock.img boot-custom.img
          
          # 5. Finalisation
          mkdir -p final_output
          mv boot-custom.img final_output/
          echo "🚀 boot.img généré avec succès dans final_output/"
          
      - name: Organize Final Output Artifacts
        run: |
          mkdir -p final_output
          mv kernel-build-234.zip final_output/

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_one_5g_ace-latest
          path: final_output/
