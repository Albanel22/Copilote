name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img stock officiel depuis : ${{ env.BOOT_URL }}"
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort ou invalide pour le boot.img"; exit 1; }
        shell: bash

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Force Built-in Display & Touchscreen Bus
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "🛠️ Injection des pilotes tactiles Motorola directement dans le noyau..."
          TARGET_CONFIG="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          if [ ! -f "$TARGET_CONFIG" ]; then
            TARGET_CONFIG="arch/arm64/configs/${{ env.DEFCONFIG }}"
          fi
          
          # Forcer les bus de communication
          sed -i 's/CONFIG_I2C_QCOM_GENI=m/CONFIG_I2C_QCOM_GENI=y/g' "$TARGET_CONFIG"
          sed -i 's/CONFIG_SPI_QCOM_GENI=m/CONFIG_SPI_QCOM_GENI=y/g' "$TARGET_CONFIG"
          
          echo "CONFIG_I2C_QCOM_GENI=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SPI_QCOM_GENI=y" >> "$TARGET_CONFIG"
          echo "CONFIG_INPUT_TOUCHSCREEN=y" >> "$TARGET_CONFIG"
          
          # Forcer TOUS les pilotes tactiles Motorola possibles en Built-in
          echo "CONFIG_TOUCHSCREEN_MOTOROLA_MULTSAN=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_NOVA_HCD=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_GOODIX_BRL=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_FOCALTECH_FTS=y" >> "$TARGET_CONFIG"
          echo "CONFIG_TOUCHSCREEN_SYNAPTICS_DSX=y" >> "$TARGET_CONFIG"
          
          echo "✅ Pilotes convertis en built-in avec succès."

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache Size
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = ${{ env.CCACHE_SIZE }}" > ~/.cache/ccache/ccache.conf

      - name: Integrate KernelSU-Next & SUSFS Patches
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "📥 Téléchargement et configuration automatique de KernelSU-Next (Branche Legacy)..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

          echo "📥 Clonage des patchs SUSFS (Branche kernel-4.19)..."
          cd ..
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 susfs_src
          cd ${{ env.KERNEL_PATH }}

          echo "🛠️ Copie des pilotes et en-têtes SUSFS..."
          SUSFS_PATCHES_DIR="../susfs_src/kernel_patches"
          
          cp -v "$SUSFS_PATCHES_DIR/include/linux/susfs.h" include/linux/
          cp -v "$SUSFS_PATCHES_DIR/fs/susfs.c" fs/
          
          echo "🛠️ Application du patch SUSFS principal sur le noyau 4.19..."
          patch -p1 < "$SUSFS_PATCHES_DIR/50_add_susfs_in_kernel-4.19.patch" || echo "⚠️ Notification d'ajustements sur le noyau"

          echo "🛠️ Application du patch SUSFS sur KernelSU-Next..."
          # Trouver le patch KSU (peut s'appeler 10_add_susfs_in_ksu.patch ou 10_enable_susfs_for_ksu.patch)
          PATCH_KSU=$(find "$SUSFS_PATCHES_DIR/KernelSU" -name "*.patch" | head -n 1)
          if [ -f "$PATCH_KSU" ]; then
            cp -v "$PATCH_KSU" drivers/kernelsu/
            cd drivers/kernelsu
            patch -p1 < "$(basename "$PATCH_KSU")" || echo "⚠️ Notification d'ajustements sur le patch KSU"
            cd ../../
          fi

          echo "📝 Activation des configurations KernelSU, KPROBES et SUSFS..."
          TARGET_CONFIG="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          if [ ! -f "$TARGET_CONFIG" ]; then
            TARGET_CONFIG="arch/arm64/configs/${{ env.DEFCONFIG }}"
          fi

          # Forcer les dépendances requises par KernelSU-Next en mode Non-GKI (Kprobes)
          echo "CONFIG_KPROBES=y" >> "$TARGET_CONFIG"
          echo "CONFIG_KPROBE_EVENTS=y" >> "$TARGET_CONFIG"
          echo "CONFIG_KSU_KPROBE_HOOKS=y" >> "$TARGET_CONFIG"

          # Forcer l'activation de KernelSU-Next et SUSFS avec les options recommandées
          echo "CONFIG_KSU=y" >> "$TARGET_CONFIG"
          echo "CONFIG_KSU_NEXT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_SUS_PATH=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_SUS_MOUNT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_OPEN_REDIRECT=y" >> "$TARGET_CONFIG"
          echo "CONFIG_SUSFS_SUS_SU=y" >> "$TARGET_CONFIG"
          
          echo "✅ Synchronisation KernelSU-Next et SUSFS validée !"
        

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-          export KCFLAGS="-Wno-error"

          echo "🛠️ Étape 1 : Génération de la configuration initiale..."
          if [ -f "arch/arm64/configs/vendor/${{ env.DEFCONFIG }}" ]; then
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/${{ env.DEFCONFIG }}
          else
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE ${{ env.DEFCONFIG }}
          fi

          echo "🛠️ Étape 1.5 : Injection forcée des configurations KernelSU-Next, KPROBES et SUSFS dans le fichier de build final..."
          FINAL_CONFIG="${{ env.BUILD_DIR }}/.config"
          
          # Forcer les dépendances fondamentales de Kprobes requises par le code selinux_hide.c
          sed -i 's/# CONFIG_KPROBES is not set/CONFIG_KPROBES=y/g' "$FINAL_CONFIG"
          sed -i 's/# CONFIG_HAVE_KPROBES is not set/CONFIG_HAVE_KPROBES=y/g/g' "$FINAL_CONFIG"
          
          echo "CONFIG_KPROBES=y" >> "$FINAL_CONFIG"
          echo "CONFIG_HAVE_KPROBES=y" >> "$FINAL_CONFIG"
          echo "CONFIG_KPROBE_EVENTS=y" >> "$FINAL_CONFIG"
          echo "CONFIG_KSU_KPROBE_HOOKS=y" >> "$FINAL_CONFIG"

          # Forcer KernelSU-Next et SUSFS
          echo "CONFIG_KSU=y" >> "$FINAL_CONFIG"
          echo "CONFIG_KSU_NEXT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_SUS_PATH=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_SUS_MOUNT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_OPEN_REDIRECT=y" >> "$FINAL_CONFIG"
          echo "CONFIG_SUSFS_SUS_SU=y" >> "$FINAL_CONFIG"

          # Rafraîchir proprement la configuration finale pour valider les ajouts
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE olddefconfig

          echo "🚀 Étape 2 : Compilation du noyau (Image)..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" -j$(nproc) Image
          
      - name: Repack Clean Boot Image
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          # Extraction propre sans toucher au Ramdisk d'origine
          ./magiskboot unpack boot.img
          
          # Remplacement uniquement du noyau
          ABS_IMAGE_ARM64="${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image"
          cp -v "$ABS_IMAGE_ARM64" kernel
          
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img "${{ github.workspace }}/boot.img"
        shell: bash

      - name: Organize Final Output Artifacts
        run: |
          mkdir -p final_output
          mv "${{ github.workspace }}/boot.img" final_output/boot.img
          
      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_one_5g_ace-latest
          path: final_output/
