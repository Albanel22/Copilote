name: Patch Official Boot with KernelSU

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Patch boot.img
        run: |
          set -euo pipefail
          # Téléchargement et préparation
          curl -fLo boot.img "https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img"
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          # Patch
          ./magiskboot unpack boot.img
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
          # Repack
          ./magiskboot repack boot.img
          mv new-boot.img patched-boot.img

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-ksu-final
          path: patched-boot.img
