name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      kernel_repo_url:
        description: 'Optional: git URL of kernel source to clone'
        required: false
        default: 'https://github.com/LineageOS/android_kernel_motorola_sm8250'
      kernel_version:
        description: 'Kernel version (tag/branch/commit) to checkout in kernel repo (optional)'
        required: false
        default: ''
      kernel_path:
        description: 'If kernel is inside this repo, relative path to kernel root. Defaults to kernel_src (cloned repo).'
        required: false
        default: 'kernel_src'
      arch:
        description: 'Target arch (arm64 or arm)'
        required: false
        default: 'arm64'
      defconfig:
        description: 'Kernel defconfig target (ex: vendor/lito-perf_defconfig)'
        required: false
        default: 'vendor/lito-perf_defconfig'
      cross_toolchain_url:
        description: 'Optional URL to a cross toolchain archive (tar.xz).'
        required: false
        default: ''
      use_ccache:
        description: 'Use ccache (true/false)'
        required: false
        default: 'true'
      device:
        description: 'Device codename (informational, used in artifact name)'
        required: false
        default: 'motorola_one_5g_ace'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: out
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set inputs
        id: vars
        run: |
          echo "KERNEL_REPO_URL=${{ github.event.inputs.kernel_repo_url }}" >> $GITHUB_OUTPUT
          echo "KERNEL_VERSION=${{ github.event.inputs.kernel_version }}" >> $GITHUB_OUTPUT
          echo "KERNEL_PATH_INPUT=${{ github.event.inputs.kernel_path }}" >> $GITHUB_OUTPUT
          echo "ARCH=${{ github.event.inputs.arch }}" >> $GITHUB_OUTPUT
          echo "DEFCONFIG=${{ github.event.inputs.defconfig }}" >> $GITHUB_OUTPUT
          echo "CROSS_TOOLCHAIN_URL=${{ github.event.inputs.cross_toolchain_url }}" >> $GITHUB_OUTPUT
          echo "USE_CCACHE=${{ github.event.inputs.use_ccache }}" >> $GITHUB_OUTPUT
          echo "DEVICE=${{ github.event.inputs.device }}" >> $GITHUB_OUTPUT

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc wget ccache git zip unzip pkg-config

      - name: Clone kernel repo unless kernel_path in workspace already has Makefile
        id: clone_kernel
        run: |
          set -euo pipefail
          DEFAULT_CLONE_URL='https://github.com/LineageOS/android_kernel_motorola_sm8250'
          KERNEL_SRC="${GITHUB_WORKSPACE}/kernel_src"
          KP_INPUT="${{ steps.vars.outputs.KERNEL_PATH_INPUT }}"
          INPUT_URL="${{ steps.vars.outputs.KERNEL_REPO_URL }}"

          # If user pointed kernel_path inside workspace and there is a Makefile there, skip clone
          if [ -n "$KP_INPUT" ] && [ "$KP_INPUT" != "." ] && [ -f "${GITHUB_WORKSPACE}/$KP_INPUT/Makefile" ]; then
            echo "Makefile found at workspace path ${KP_INPUT} — skipping clone."
            echo "KERNEL_CLONED_PATH=${GITHUB_WORKSPACE}/$KP_INPUT" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Choose source URL: prefer input, else fallback to default
          if [ -n "$INPUT_URL" ]; then
            CLONE_URL="$INPUT_URL"
          else
            CLONE_URL="$DEFAULT_CLONE_URL"
            echo "No kernel_repo_url input — using default: $CLONE_URL"
          fi

          echo "Cloning kernel repo: $CLONE_URL -> $KERNEL_SRC"
          rm -rf "$KERNEL_SRC"
          # If secret is set, use token for authenticated clone
          if [ -n "${{ secrets.KERNEL_TOKEN }}" ]; then
            KERNEL_TOKEN="${{ secrets.KERNEL_TOKEN }}"
            CLONE_URL="https://x-access-token:${KERNEL_TOKEN}@${CLONE_URL#https://}"
            echo "Using authenticated clone URL"
          fi
          git clone --depth=1 "$CLONE_URL" "$KERNEL_SRC"
          if [ -n "${{ steps.vars.outputs.KERNEL_VERSION }}" ]; then
            cd "$KERNEL_SRC"
            if git rev-parse --verify --quiet "${{ steps.vars.outputs.KERNEL_VERSION }}" >/dev/null; then
              git fetch --depth=1 origin "${{ steps.vars.outputs.KERNEL_VERSION }}" || true
              git checkout --detach "${{ steps.vars.outputs.KERNEL_VERSION }}" || true
            fi
          fi
          echo "KERNEL_CLONED_PATH=$KERNEL_SRC" >> $GITHUB_OUTPUT
        shell: bash

      - name: Debug clone & Makefile presence
        run: |
          set -euo pipefail
          # Read the output (may be empty) then fallback in bash if empty
          KPATH="${{ steps.clone_kernel.outputs.KERNEL_CLONED_PATH }}"
          if [ -z "$KPATH" ]; then
            KPATH="${GITHUB_WORKSPACE}"
          fi
          echo "KERNEL_CLONED_PATH=${KPATH}"
          echo "Exists: $( [ -d "$KPATH" ] && echo yes || echo no )"
          echo "Listing top entries:"
          ls -la "$KPATH" | sed -n '1,200p' || true
          echo "Top-level Makefile present: $( [ -f "$KPATH/Makefile" ] && echo yes || echo no )"
          if [ -f "$KPATH/Makefile" ]; then
            head -n 40 "$KPATH/Makefile" || true
          fi
          echo "arch/${{ steps.vars.outputs.ARCH }}/Makefile present: $( [ -f "$KPATH/arch/${{ steps.vars.outputs.ARCH }}/Makefile" ] && echo yes || echo no )"
          if [ -f "$KPATH/arch/${{ steps.vars.outputs.ARCH }}/Makefile" ]; then
            head -n 20 "$KPATH/arch/${{ steps.vars.outputs.ARCH }}/Makefile" || true
          fi
        shell: bash

      - name: Determine kernel path (cloned > input > workspace)
        id: detect
        run: |
          set -euo pipefail
          # prefer the cloned path from previous step
          if [ -n "${{ steps.clone_kernel.outputs.KERNEL_CLONED_PATH }}" ]; then
            echo "KERNEL_PATH_FINAL=${{ steps.clone_kernel.outputs.KERNEL_CLONED_PATH }}" >> $GITHUB_OUTPUT
            echo "Detected=clone_output" >> $GITHUB_OUTPUT
            exit 0
          fi
          KP="${{ steps.vars.outputs.KERNEL_PATH_INPUT }}"
          if [ -z "$KP" ] || [ "$KP" = "." ]; then
            KP="${GITHUB_WORKSPACE}"
          else
            KP="${GITHUB_WORKSPACE}/$KP"
          fi
          echo "KERNEL_PATH_FINAL=$KP" >> $GITHUB_OUTPUT
          echo "Detected=input_or_workspace" >> $GITHUB_OUTPUT
        shell: bash

      - name: Export environment
        run: |
          echo "KERNEL_PATH=${{ steps.detect.outputs.KERNEL_PATH_FINAL }}" >> $GITHUB_ENV
          echo "ARCH=${{ steps.vars.outputs.ARCH }}" >> $GITHUB_ENV
          echo "DEFCONFIG=${{ steps.vars.outputs.DEFCONFIG }}" >> $GITHUB_ENV
          echo "CROSS_TOOLCHAIN_URL=${{ steps.vars.outputs.CROSS_TOOLCHAIN_URL }}" >> $GITHUB_ENV
          echo "USE_CCACHE=${{ steps.vars.outputs.USE_CCACHE }}" >> $GITHUB_ENV
          echo "DEVICE=${{ steps.vars.outputs.DEVICE }}" >> $GITHUB_ENV
          echo "KERNEL_VERSION=${{ steps.vars.outputs.KERNEL_VERSION }}" >> $GITHUB_ENV

      - name: Show kernel path & Makefile check
        run: |
          echo "KERNEL_PATH=$KERNEL_PATH"
          echo "Listing KERNEL_PATH contents:"
          ls -la "$KERNEL_PATH" || true
          if [ -f "$KERNEL_PATH/Makefile" ]; then
            echo "Found top-level Makefile at: $KERNEL_PATH/Makefile"
          else
            echo "ERROR: No top-level Makefile at $KERNEL_PATH/Makefile" >&2
            ls -la "$KERNEL_PATH" || true
            exit 1
          fi
          echo "Also check arch/${ARCH}/Makefile: $( [ -f "$KERNEL_PATH/arch/${ARCH}/Makefile" ] && echo yes || echo no )"
          if [ -f "$KERNEL_PATH/arch/${ARCH}/Makefile" ]; then
            head -n 20 "$KERNEL_PATH/arch/${ARCH}/Makefile" || true
          fi
        shell: bash

      - name: Configure kernel (guarded)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          CONFIG_DIR="arch/${ARCH}/configs"
          echo "Available configs (first 200 lines):"
          if [ -d "$CONFIG_DIR" ]; then
            ls -1 "$CONFIG_DIR" | sed -n '1,200p' || true
          else
            echo "No $CONFIG_DIR directory"
          fi
          if [ -n "${DEFCONFIG}" ]; then
            echo "Running make ${DEFCONFIG}"
            make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} ${DEFCONFIG}
          else
            echo "No DEFCONFIG provided — trying fallbacks"
            if [ -f "$CONFIG_DIR/vendor_defconfig" ]; then
              make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} vendor_defconfig
            elif [ -f "$CONFIG_DIR/msm_defconfig" ]; then
              make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} msm_defconfig
            elif [ -f "$CONFIG_DIR/defconfig" ]; then
              make O=$BUILD_DIR ARCH=${ARCH} CROSS_COMPILE=${CROSS_COMPILE} defconfig
            else
              echo "ERROR: No defconfig found; provide DEFCONFIG input."
              exit 1
            fi
          fi
        shell: bash

      - name: Build kernel (Image, dtbs, modules)
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          echo "Build jobs: $JOBS"
          if [ "${ARCH}" = "arm64" ]; then
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE Image
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE dtbs
          else
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE zImage
            make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE dtbs
          fi
          make -j$JOBS O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE modules
        timeout-minutes: 120
        shell: bash

      - name: Install & package modules
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -euo pipefail
          mkdir -p tmp_modules
          make O=$BUILD_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE modules_install INSTALL_MOD_PATH=$PWD/tmp_modules || true
          tar -C tmp_modules -czf modules.tar.gz .
        shell: bash

      - name: Built-in packaging (create flashable zip)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/artifacts"
          FLASH_DIR="${ARTIFACT_DIR}/flash"
          rm -rf "$FLASH_DIR" "$ARTIFACT_DIR"
          mkdir -p "$FLASH_DIR"
          KROOT="${KERNEL_PATH}"
          if [ -f "$KROOT/$BUILD_DIR/arch/arm64/boot/Image" ]; then
            cp "$KROOT/$BUILD_DIR/arch/arm64/boot/Image" "$FLASH_DIR/kernel.img" || true
          elif [ -f "$KROOT/$BUILD_DIR/arch/arm/boot/zImage" ]; then
            cp "$KROOT/$BUILD_DIR/arch/arm/boot/zImage" "$FLASH_DIR/kernel.img" || true
          fi
          mkdir -p "$FLASH_DIR/dtbs"
          shopt -s nullglob
          for f in "$KROOT/$BUILD_DIR"/arch/*/boot/dts/**/*.dtb "$KROOT/$BUILD_DIR"/arch/*/boot/dts/*.dtb "$KROOT/artifacts"/*.dtb; do
            [ -f "$f" ] || continue
            cp -v "$f" "$FLASH_DIR/dtbs/" || true
          done
          shopt -u nullglob
          if [ -f "$KROOT/$BUILD_DIR/arch/arm64/boot/dtbo.img" ]; then
            cp "$KROOT/$BUILD_DIR/arch/arm64/boot/dtbo.img" "$FLASH_DIR/dtbo.img" || true
          fi
          if [ -f "$KROOT/modules.tar.gz" ]; then
            cp "$KROOT/modules.tar.gz" "$FLASH_DIR/modules.tar.gz" || true
          elif [ -f "$KROOT/$BUILD_DIR/modules.tar.gz" ]; then
            cp "$KROOT/$BUILD_DIR/modules.tar.gz" "$FLASH_DIR/modules.tar.gz" || true
          fi
          printf '%s\n' \
            "This package contains kernel image, dtbs, optional dtbo and modules." \
            "To repack into a boot.img you need a compatible ramdisk (stock ramdisk.img or boot.img):" \
            '  mkbootimg --kernel kernel.img --ramdisk stock-ramdisk.img --cmdline \"<cmdline>\" --base <base> -o new-boot.img' \
            "Then flash with:" \
            "  fastboot flash boot new-boot.img" \
            "Be careful: use correct cmdline/base/pagesize for your device." \
            > "$FLASH_DIR/README_REPACK_AND_FLASH.txt"
          ZIP="${ARTIFACT_DIR}/kernel-${DEVICE}-${KERNEL_VERSION:-latest}.zip"
          pushd "$FLASH_DIR" >/dev/null
          zip -r -y "$ZIP" . || true
          popd >/dev/null
          echo "Created package: $ZIP"
          ls -la "$ARTIFACT_DIR" || true
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts-${{ github.run_id }}
          path: |
            artifacts
            ${{ env.KERNEL_PATH }}/$BUILD_DIR/.config
            ${{ env.KERNEL_PATH }}/$BUILD_DIR/.version  || true
            ${{ env.KERNEL_PATH }}/modules.tar.gz  || true
