name: Kernel CI — build & package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_PATH: kernel_src
  BUILD_DIR: out
  ARCH: arm64
  DEFCONFIG: lito-perf_defconfig
  CCACHE_SIZE: 5G
  BOOT_URL: 'https://mirrorbits.lineageos.org/full/kiev/20260628/boot.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex glibc-source libelf-dev libssl-dev libncurses-dev gcc-aarch64-linux-gnu clang llvm lld device-tree-compiler zip unzip curl git

      - name: Download Stock Boot Image
        shell: bash
        run: |
          set -euo pipefail
          echo "📥 Téléchargement du boot.img stock officiel..."
          curl -fLo boot-stock.img "${{ env.BOOT_URL }}" || { echo "❌ Lien mort ou invalide pour le boot.img"; exit 1; }

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 --depth=1 ${{ env.KERNEL_PATH }}

      - name: Integrate ReSukiSU Driver
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          echo "🎭 Récupération et intégration du gestionnaire ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
          
          echo "🔓 Neutralisation de la sécurité Non-GKI et bascule en mode Manual Hooks..."
          sed -i '/TP hooks are incompatible/s/\$(error/\$(warning/g' drivers/kernelsu/Kbuild
          
          echo "🪓 Application chirurgicale des Manual Hooks..."
          
          # 1. Modification de fs/open.c (Ouverture des fichiers)
          sed -i '1i #if defined(CONFIG_KSU)\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename, int *mode, int *flags);\n#endif' fs/open.c
          sed -i '/long do_faccessat(/,/{/s/{/{\n#if defined(CONFIG_KSU)\n\tint ksu_flags = 0;\n\tksu_handle_faccessat(\&dfd, \&filename, \&mode, \&ksu_flags);\n#endif/' fs/open.c
          
          # 2. Modification de fs/stat.c (Statistiques des fichiers - Correction du mask)
          sed -i '1i #if defined(CONFIG_KSU)\n#include <linux/types.h>\nextern int ksu_handle_stat(int *dfd, const char __user **filename, int *flags, u32 *mask);\n#endif' fs/stat.c
          sed -i '/int vfs_statx(/,/{/s/{/{\n#if defined(CONFIG_KSU)\n\tksu_handle_stat(\&dfd, \&filename, \&flags, \&request_mask);\n#endif/' fs/stat.c
          
          # 3. Modification de fs/exec.c (Exécution des processus)
          sed -i '1i #if defined(CONFIG_KSU)\nstruct filename;\nstruct user_arg_ptr;\nextern int ksu_handle_execveat(int *fd, struct filename **filename, struct user_arg_ptr *argv, struct user_arg_ptr *envp, int *flags);\n#endif' fs/exec.c
          sed -i '/do_execveat_common(/,/{/s/{/{\n#if defined(CONFIG_KSU)\n\tksu_handle_execveat(\&fd, \&filename, \&argv, \&envp, \&flags);\n#endif/' fs/exec.c

          echo "🪓 Remplacement complet et stubs pour pkg_observer..."
          cat << 'EOF' > drivers/kernelsu/manager/pkg_observer.c
          #include <linux/init.h>
          #include <linux/types.h>
          int ksu_pkg_observer_init(void) { return 0; }
          void ksu_pkg_observer_exit(void) {}
          int ksu_fsnotify_init(void) { return 0; }
          void ksu_fsnotify_exit(void) {}
          int ksu_observer_init(void) { return 0; }
          void ksu_observer_exit(void) {}
          void ksu_set_current_proc_unprivillege(void) {}
          EOF
          
          echo "📝 Configuration du defconfig en mode manuel..."
          TARGET_CONFIG="arch/arm64/configs/vendor/${{ env.DEFCONFIG }}"
          if [ ! -f "$TARGET_CONFIG" ]; then
            TARGET_CONFIG="arch/arm64/configs/${{ env.DEFCONFIG }}"
          fi
          
          # KSU actif en mode manuel (Désactive les kprobes automatiques qui plantaient l'écran tactile)
          echo "CONFIG_KSU=y" >> "$TARGET_CONFIG"
          echo "CONFIG_KSU_MANUAL_HOOKS=y" >> "$TARGET_CONFIG"
          
          echo "✅ Transition vers les Manual Hooks sécurisée et isolée."
          
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-kernel
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache Size
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = ${{ env.CCACHE_SIZE }}" > ~/.cache/ccache/ccache.conf

      - name: Multi-stage Kernel Compilation
        working-directory: ${{ env.KERNEL_PATH }}
        run: |
          set -uo pipefail
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.ARCH }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error"
          
          echo "🛠️ Étape 1 : Génération de la configuration..."
          if [ -f "arch/arm64/configs/vendor/${{ env.DEFCONFIG }}" ]; then
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE vendor/${{ env.DEFCONFIG }}
          else
            make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE ${{ env.DEFCONFIG }}
          fi
          
          echo "🚀 Étape 2 : Compilation du noyau (Image)..."
          make O=${{ env.BUILD_DIR }} LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" -j$(nproc) Image

      - name: Repack Clean Boot Image
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repack && cp boot-stock.img repack/boot.img
          cd repack
          curl -fLo magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          ./magiskboot unpack boot.img
          
          ABS_IMAGE_ARM64="${{ github.workspace }}/${{ env.KERNEL_PATH }}/${{ env.BUILD_DIR }}/arch/arm64/boot/Image"
          cp -v "$ABS_IMAGE_ARM64" kernel
          ./magiskboot repack boot.img new-boot.img
          mv new-boot.img "${{ github.workspace }}/boot.img"

      - name: Organize Final Output Artifacts
        run: |
          mkdir -p final_output
          mv "${{ github.workspace }}/boot.img" final_output/boot.img

      - name: Upload Finished Packaged Assets
        uses: actions/upload-artifact@v4
        with:
          name: kernel-motorola_one_5g_ace-latest
          path: final_output/
